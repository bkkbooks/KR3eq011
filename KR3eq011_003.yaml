body:
  text: 卷下治法司天運氣論邪説之外有欺人之學有耳食之學何謂欺空之學好為高談奇論以駭人聽聞或剿襲前人之語以示淵博彼亦自知其為全然不解但量他人亦莫這能深考也此為欺人之學何謂耳食之學或竊聽他人之説或偶閲先古之書略記數語自信為已得其祕大言不慚以此動衆所謂道聽途説是也如近人所談司天運氣之類是也彼所謂司天運氣者以為何氣司天則是年民當何病假如厥陰司天風氣主之則是年之病皆當作風治此等議論所謂耳食也蓋司天運氣之説黃帝不過言天人相應之理如此其應驗先候於脈凡遇少陰司天則兩手寸口不應厥陰司天則右寸不應大陰司天則左寸不應若在泉則尺脈不應亦如之若脈不當不其位則病相反者死此診脈之一法也至於病則必觀是年歲氣勝與不勝如厥陰司天風淫所勝民病心痛脅滿等症倘是年風淫雖勝而民另生他病則不得亦指為風淫之病也若是年風淫不勝則又不當從風治矣經又云相火這下水氣乘之水位之下火氣乘之五氣之勝皆然此乃亢則害承乃制之理即使果勝亦有相剋者乘之更與司天之氣相反矣又云初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也有勝則復無勝則否則歲半以前屬司天歲半以後又屬在泉其中又有勝不勝之殊其病更無定矣又云厥陰司天左少陰右太陽謂之左間右間六氣皆有左右間每間主六十日是一歲之中復有六氣循環作主矣其外能南政北政之反其位天符歲會三合之不齊太過不及之異氣欲辨明分晰終年不能盡其蘊當時聖人不過言天地之氣運行旋轉如此耳至於人之得病則豈能一一與之盡合一歲之中不許有一人生他病乎故內經治歲氣勝復亦不分所以得病之因總之見病治病如風淫於內則治以辛涼六氣皆有簡便易守之法又云治諸勝復寒者熱之熱者寒之溫者清之清者溫之無問其數以平為期何等劃一凡運氣之道言其深者聖人有所不能知及施之實用則平正通達人人易曉但不若今之醫者所云何氣司天則生何病正與內經圓機活法相背耳醫道通治道論治身猶治天下也天下之亂有由乎天者有由乎人者由乎天者如夏商水旱之災是也由乎人者如歷代季世之變是也而人之病有由乎先天者有由乎後天者由乎先天者其人生而虛弱柔脆是也由乎後天者六淫之害七情之感是也先天之病非其人之善養與服大藥不能免於夭折猶之天生之亂非大聖大賢不能平也後天之平凡乃風寒暑濕火燥之疾所謂外患也喜怒憂思悲驚恐之害所謂內憂也治外患者以攻勝四郊不靖而選將出師速驅除之可也臨辟雍而講禮樂則敵在門矣故邪氣未盡則輕而用補者使邪氣內入而亡治內傷者以養勝綱紀不正而崇儒講道徐化導之可也若任刑罰而嚴誅戮則禍益深矣故正氣不足而輕用攻者使其正氣消盡而亡然而大盛之世不無玩民故刑罰不廢則補中之攻也然使以小寇而遽起戎兵是擾民矣故補中之攻不可過也徵誅之年亦修內政故教養不弛則攻中之補也然以戎首而稍存姑息則養矣故攻中之補不可誤也天下大事以天下全力為之則事不墮天下小事以一人從容處之則事不擾患大病以大藥制之則病氣無餘患小病以小方處之則正氣不傷然而施治有時先後有序大小有方輕重有度疏密有數純而不雜整而不亂所用之藥各得其性則器使之道所處之方各得其理則調度之法能即小以喻大誰謂良醫之法不可通於良相也五方異治論人稟天地之氣以生故其氣體隨地不同西北之人氣深而厚凡受風寒難於透出宜用疏通重劑東南之人氣浮而薄凡遇風寒易於疏泄宜用疏通輕劑又西北地寒當用溫熱之藥然或有邪蘊於中而內反熱則用辛寒為宜東南地溫當用清涼之品然或有氣邪隨散則易於亡陽又當用辛溫為宜至交廣之地則汗出無度亡陽尤易附桂為常用之品若中州之卑濕山陝之高燥皆當隨地制宜故入其境必問水土風俗而細調之不但各府各別即一縣之中風氣亦有迥殊者並有所産之物所出之泉皆能致病土人皆有極效之方皆宜詳審訪察若恃己之能執己之見治竟無功反為土人所笑矣湖州長興縣有合溪小兒飲此水則腹中生痞土人治法用錢挂頸以兩頭按乳頭上剪斷即將此線挂轉將兩頭向背脊上一併拽齊線頭盡處將黑點記脊上用艾灸之或三壯或七壯好消永不再發服藥無效病隨國運論天地之氣運數百年一更易而國家這氣運亦應之上古無論即以近代言如宋之末造中原失陷主弱臣弛張潔古李東垣輩立方皆以補中宮健脾胃用剛燥扶陽之藥為主局方亦然至於明季主暗臣專膏澤不下於民故丹溪以下諸醫皆以補陰益下為主至我本運録極隆之會聖聖相承大權獨攬朝綱整肅惠澤旁流此陽盛於上之明徵也又冠飾朱纓口燔煙草五行惟火獨旺故其為病皆屬盛陽上越之證數十年前云間老醫知此義者往往專以芩連知柏挽回誤投溫補之人應手奇效此實與運氣相符近人不知此理非惟不能隨症施治並執寧過溫熱毋過寒冷之説偏於溫熱又我矯枉過正之論如中暑一症或有伏陰在內者當用大順散理中湯此乃千中之一今則不論何人凡屬中暑皆用理中等湯我目睹七竅皆裂而死者不可勝數至於託言祖述東垣用蒼朮等燥藥者舉國皆然此等惡習皆由不知天時國運之理誤引舊説以害人也故古人不知天地人者不可以為醫針灸失傳論靈素兩經其詳論臟腑經穴疾病等説為針法言者十之七八為方藥言者十之二三上古之重針法如此然針道而方藥易病者亦樂於服藥而苦於針所以後世方藥盛行而針法不講今之為針者其顯然之失有十而精微尚不與焉兩經所言十二經之出入起止淺深左右交錯不齊其穴隨經上下亦參差無定今人只執同身寸依左右一直豎量並不依經曲折則經非經而穴非穴此一失也兩經治病云某病取某穴者固多其餘則指經而不指穴如靈樞終始篇云人迎一盛瀉足少陽補足厥陰厥病篇云厥頭痛或取足陽明太陰或取手少陽足少陰耳聾取手陽明嗌乾取足少陰皆不言其穴其中又有瀉子補母等義今則每病指定幾穴此二失也兩經論治井滎輸經合最重冬刺井春刺滎夏刺輸長夏刺經秋刺合凡只言某經而不言某穴者大者皆指井滎五者為言今則皆不講矣此三失也補瀉之法內經云吸側內針無令氣忤靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃去大氣皆出為瀉呼盡內針靜以久留以氣至為故候吸引針氣不得出各在其處推闔其門令神氣存大氣留止為補又必迎其經氣疾內而徐出不按其痏為瀉隨其經氣徐內而疾出即按其痏為補其法多端今則轉針之時以大指出為瀉搓入為補此四失也納針之後必候其氣刺實者陰氣隆至乃去針刺虛者陽氣隆至乃出針氣不至無問其數氣至即去之勿復針難經云先以左手壓按所針之處彈而努之爪而下之其氣來如動脈之狀順而刺之得氣因推內之是謂補動而伸之是謂瀉今則時時轉動俟針下寬轉而後出針不問氣之至與不至此五失也凡針之深淺隨時不同春氣在毛夏氣在皮膚秋氣在肌肉冬氣在筋骨故春夏刺淺秋冬制深反此有害今則不論四時分寸各有定數此六失也古之用針凡瘧疾傷寒寒熱咳嗽一切臟腑七竅等病無所不治今則只治經脈形體痿痹屈伸等病而已此七失也古人刺法取血甚多靈樞血絡論言之最詳而頭痛腰痛尤必大瀉其血凡血絡有邪者必盡去之若血射出而黑必令變色見赤血而止否則病不除而反有害今人則偶爾見血病者醫者已惶恐失據病何由除此八失也內經刺法有九變十二節九變者輸刺遠道刺經刺絡刺分刺大寫刺毛刺巨刺淬刺十二節者偶刺報刺恢刺齊刺揚刺直針刺輸刺短刺浮刺陰刺傍刺贊刺以上二十一法視病所宜不可更易一法不備則一病不愈今則只直刺一法此九失也古之針制有九鑱針員針匙針鋒針鈹針員利針毫針長針大針亦隨病所宜而用一失其制則病不應今則大者如員針小者如毫針而已豈能治痼疾暴氣此十失也其大端之失已如引而其成尤要者更在神志專一手法精嚴經云神在秋毫屬意病者審視血脈刺之無殆又云經氣已至慎守勿失深淺在志遠近若一如臨深淵手如握虎神無營於衆物又云伏如橫弩起如發機其專精敏妙如此今之醫者隨手下針漫不經意即使針法如古志不凝而機不達猶恐無效況乎全與古法相背乎其外更有先後之序迎隨之異貴賤之殊勞逸之分肥瘦之度多少之數更僕難窮果能潛心體察以合聖度必有神功其如人之畏難就易盡違古法所以世之視針甚輕而其術亦不甚行也若灸之一法則較之針所治之病不過十之一二知針之理則灸又易易耳水病針法論凡刺之法不過補瀉經絡祛邪納氣而已其取穴甚少惟水病風㽷膚脹必刺五十七穴又云皮膚之血盡取之何也蓋水旺必克脾土脾土衰則遍身皮肉皆腫不特一經之中有水氣矣若僅刺一經則一經所過之地水自漸消而他經之水不消則四面會聚並一經已瀉之水亦仍滿矣故必周身腫滿之處皆刺而瀉之然後其水不復聚耳此五十七穴者皆臟之經絡水之所容也此與大禹治洪水之法同蓋洪水泛溢必有江淮河濟各引其所近之衆流以入海必不能使天下之水只歸一河以入海也又出水之後更必調其飲食經云方飲無食方食無飲欲使飲食異居則水不從食以至於脾客觀存在濕之處也無食他食百三十五日此症之難愈如此余往時治此病輕者多愈重者必復腫蓋由五十七穴未能全刺而病人亦不能守戒一百三十五日也此等大症少違法度即無愈理可不慎哉出奇制病論病有經有緯有常有變有純有雜有正有反有整有亂並有從醫書所之病歷來無治法者而其病又實可愈既無陳法可守是必熟尋內經難經等書審其經絡臟受病之處及七六氣相感之因與夫內外分合氣血聚散之形必有鑿鑿可徵者而後立為治法或先或後或並或分或上或下或前或後取藥極當立方極正而寓以巧思奇法深入病機不使擀格如疱丁之解牛雖筋骨關節之間亦遊刃有餘然後天下之病千緒萬端而我之設法亦千變化全在平時於極難極險之處參悟通徹而後能臨事不眩否則一遇疑難即束手無措冒昧施治動輒得咎誤人不少矣治病緩急論病有當急治者有不當急治者外感之邪猛悍剽疾內犯臟腑則元氣受傷無以託疾於外必乘其方起之時邪入尚淺與氣血相亂急驅而出之於外則易而且速若俟邪氣已深與氣血相亂然後施治則元氣大傷此當急治者也若夫病機未定無所歸著急用峻攻則邪氣益橫如人之傷食方在胃中則必先用化食之藥使其食漸消由中焦而達下焦變成渣穢而出自然漸愈若即以硝黃峻藥下之則食尚在上焦即使隨藥而下乃皆未化之物腸胃中脂膜與之全下而人已大疲病必生變此不當急治者也以此類推余病可知至於虛人與老少之疾尤宜分別調護使其元氣漸轉則正復而邪退醫者不明此理而求速效則補其所不當補攻其所不當攻所服之藥不驗又轉求他法無非誅伐無過至當愈之時其人已為藥所傷而不能與天地之生氣相應矣故雖有良藥用之非時反能致害緩急之理可不講哉治病分合論一病而當分治者如痢疾腹痛脹滿則或先治脹滿或先治腹痛即脹滿之中亦不同或因食或因氣或先治食或先治氣腹痛之中亦不同或因積或因寒或先去積或先散寒中不同皆當神其輕重而審察之以此類推則分治之法可知矣有當合治者如寒熱腹痛頭疼泄瀉厥冒胸滿內外上下無一不病則當求其因何而起先於諸症中擇最甚者為主而其餘症每症加專治之藥一二味以成方則一劑而諸症皆備以此類推則合治之法可知矣若亦有分合焉有一病而合數藥以治之者閲古聖人制方之法自知有數病而一藥治之者閲本草之主治自知為醫者無一病不窮究其因無一方不洞悉其理無一藥不精通其性庶幾可以自信而不枉殺人矣發汗不用燥藥論驅邪之法惟發表攻裡二端而已發表所以開其毛孔令邪從汗出也當用至輕至淡芳香清冽之品使邪氣緩緩從皮毛透出無犯中焦無傷津液仲景麻黃桂枝等湯是也然猶恐其營中陰氣為風火所煽而消耗於內不能滋潤和澤以托邪於外於是又啜薄粥以助胃氣以益津液此服枝湯之良法主發汗之方皆可類推汗之必資於津液如此後世不知凡用發汗之方每專用厚朴葛根羌活白芷蒼朮豆蔻等溫燥之藥即使其人津液不虧內既為風火所熬又復為燥藥所燥則汗從何生汁不能生則邪無所附而出不但不出邪氣反為燥藥鼓動益復橫肆與正氣相亂邪火四布津液益傷而舌焦唇乾便閉目赤種種火象自生則身愈熱神漸昏惡症百出若再發汗則陽火盛極動其真陽腎水來救元陽從之大汗上泄亡陽之危症生矣輕者亦成痙症遂屬壞病難治故用燥藥發汗而殺人者不知凡幾也此其端開於李東垣其所著書立方皆治濕邪之法與傷寒雜感無涉而後人宗其説以治一切外感之症其害至今益甚況治濕邪之法亦以淡滲為主如豬苓五苓之類亦無以燥勝之者蓋濕亦外感之邪總宜驅之外出而兼以燥濕之品斷不可專用勝濕之藥使之內攻致邪與正爭而傷元氣也至於中寒之亦先以發表為主無竟用熱藥以勝寒之理必其寒氣乘虛陷入而無出路然後以薑附回其陽此仲景用理中之法也今乃以燥藥發雜感之汗不但非古聖之法並誤用東垣之法醫道失傳只此淺近之理不知何況深微者乎病不可輕汗論治病之法不外汗下二端而已下之害人其危立見故醫者病者皆不敢輕投至於汗多亡陽而死者十有二三雖死而人不覺也何則凡人患風寒之疾必相戒以為寧暖無涼病者亦重加覆護醫者亦云服藥必須汗出而解故病人之求得汗人人以為當然也秋冬之時過暖尚無大害至於盛夏初秋天時暑燥衛氣開而易泄更加閉戶重衾復投發散之劑必至大汗不止而陽亡矣又外存這徉汗未出之時必煩悶惡熱及汗大出之後衛氣盡泄必陽衰而畏寒始之暖覆猶屬勉強至此時雖欲不覆而不能愈覆愈汗愈汗愈寒直至汗出如油手足厥冷而病不可為矣其死也神氣甚清亦無痛苦病者醫者及同之人皆不解其何故而忽死惟有相顧噩然可已我見甚多不可不察也總之有病之人不可過涼亦不宜太暖無事不可令汗出惟服藥之時宜令小汗仲景服桂枝湯法云服湯已溫覆令微似汗不可如水淋漓此其法也至於亡陽未劇尤可挽回傷寒論中真武理中四逆等法可考若已脫盡無可補救矣又盛暑之時病者或居樓上或臥近灶之所無病之人一立其處汗出如雨患病者必至時時出汗既吵亡陽亦必陰竭而死雖無移徙之處必擇一席稍涼之地而處之否則神丹不救也傷風難治論凡人偶感風寒頭痛發熱咳嗽涕出俗語謂之傷風非傷寒論中所云之傷風乃時行之雜感也人皆忽之不知此乃至難治之疾生死之所關也蓋傷風之疾由皮毛以入於肺肺為嬌臟寒熱皆所不宜太寒則邪氣凝而不出太熱則火爍金而動血太潤則生痰飲太燥則耗精液太泄則汗出而陽虛太澀則氣閉而邪結並有視為微疾不避風寒不慎飲食經年纍月病機日深或成血證或成肺痿或成哮喘或成怯弱比比皆然誤治之害不可勝數諺云傷風不醒變成勞至言也然則治之何如一驅風蘇葉荊芥之類二消痰半夏象貝之類三降氣蘇子前胡之類四和榮衛桂枝白芍之類五潤津液蔞仁元參之類六養血當歸阿膠之類七清火黃芩山梔之類八理肺桑皮大力子之類八者隨其症之輕重而加減之更加以避風寒戒辛酸則庶幾漸愈否則必成大病醫者又加以升提辛燥之品如桔梗乾薑之類不效即加以酸收如五味子之類則必見血及見血隨用熟地麥冬以實其肺即成勞而死四十年以來我見以千計矣傷哉攻補寒熱同用論虛證宜補實證宜瀉盡人而知之者然或人虛而證實如弱體之人冒風傷食之類或人實而證虛如強壯之人勞倦亡陽之類或有人本不虛而邪深難出又有人已極虛而外邪尚伏種種不同若純用補則邪氣益固純用攻則正氣隨脫此病未愈彼病益深古方所以有攻補同用之法疑之者曰兩藥異性一水同煎使其相制則攻者不攻補者不補不如勿服若或兩藥不相制分途而往則或反補其所當攻攻其所當補則不惟無益而反有害是不可不慮也此正不然蓋藥之性各盡其能攻者必攻強補者必補弱猶掘坎於地水從高處流下必先盈坎而後進必不反向高處流也如大黃與人參同用大黃自能逐去是堅積決不反傷正氣人參自能充益正氣決不反補邪氣蓋古人制方之法分經別臟有神明之道焉如瘧疾之小柴胡湯瘧之寒熱往來乃邪在少陽木邪侮土中宮無主故寒熱無定於是用柴胡以驅少陽之邪柴胡必不犯脾胃用人參以健中宮之氣人參必不入肝膽則少陽之邪自去而中土之氣自旺二藥各歸本經也如桂枝湯桂枝走衛以祛風白芍走榮以止汗亦各歸本經也以是而推無不盡然試以神農本草諸藥主治之説細求之自無不得矣凡寒熱兼用之法亦同此義故天下無難治之症後世醫者不明此理藥惟一途若遇病情稍異非顧此失彼即遊移浮泛無往而非棘手之病矣但此必本於古人制方成法而神明之若竟私心自用攻補寒熱雜亂不倫是又殺人之術也臨病人問所便論病者之愛惡苦樂即病情虛實熱之徵醫者望色切脈而知之不如其自言之為尤真也惟病者不能言之處即言而不知其所以然之故則賴醫者推求其理耳今乃病者所自知之平凡明明為醫者言之則醫者正可因其言而知其病之所在以治之乃不以病人自知之真對症施治反執己之偏見強制病人未有不誤人者如傷寒論中雲能食者為中風不能食者為中寒則傷寒內中風之症未嘗禁其食也乃醫者見為傷寒之症斷不許食凡屬感證皆不許其食甚有病已半愈胃虛求食而亦禁之以至因餓而死者又傷寒論云欲飲水者稍稍與之蓋實火煩渴得水則解未嘗禁冷水也乃醫家凡遇欲冷飲之人一概禁止並有伏暑之病得西瓜而即愈者病人哀求欲食亦斷絶不與至煩渴而死如此之類不可枚舉蓋病者之性情氣體有能受溫熱者有能受寒涼者有不受補者有不禁攻者各有不同乃必強而從我意見況醫者之意見亦各人不同於是治病之法無一中肯者矣內經云臨病人問所便蓋病人之所便即病情真實之所在如身大熱而反欲熱飲則假熱而真寒也身寒戰而反欲寒飲是假寒而真熱也以此類推百不失一而世之醫者偏欲與病人相背何也惟病人有所嗜好而與病相害者則醫者宜開導之如其人本喜酸或得嗽症則酸宜忌如病人本喜酒得濕病則酒宜忌之類此則不可縱欲以益其疾若與病證無礙病人之所喜則從病人之便即所以治其病也此內經辨證之精義也治病不必顧忌論凡病人或體虛而患實邪或舊有他病與新病相反或一人兼患二病其因又相反或外上下各有所病醫者躊躇束手不敢下藥此乃不知古人制方之道者也古人用藥惟病是求藥所以制病有一病則有一藥以制之其人有是病則其藥專至於病所而驅其邪決不反至無病之處以為禍也若留其病不使去雖強壯之人遷延日久亦必精神耗竭而死此理甚易明也如怯弱之人本無攻伐之理若或傷寒而邪入陽明則仍用硝黃下藥邪去而精氣自復如或懷妊之婦忽患癥瘕必用桃仁大黃以下其瘕瘀去臺自安或老年及久病之人或宜發散或宜攻伐皆不可因其血氣之衰而兼用補益如傷寒之後食復女勞復仲景皆治其食清其火並不因病後而用溫補惟視病之所在而攻之中病即止不復有所顧慮故天下無束手之病惟不能中病或偏或誤或太過則不病之處亦傷而人危矣俗所謂有病病當之此歷古相傳之法也故醫者當疑難之際多所顧忌不敢對症用藥者皆視病不明辨證不的審方不真不知古聖之精義者也病深非淺藥能治論天下有治法不誤而始終無效者此乃病氣深痼非泛然之方藥所能愈也凡病在皮毛榮衛之間即使病勢極重而所感之位甚淺邪氣易出至於臟腑筋骨之痼疾如勞怯痞隔風痹痿厥之類其感非一日其邪在臟腑筋骨如油之八面與正氣相併病家不知屢易醫家醫者見其不效雜藥亂投病日深而元氣日敗遂至不救不知此病非一二尋常之方所能愈也今之集方書者如風痹大症之類前録古方數首後附以通治之方數首如此而已此等治法豈有愈期必當遍考此病之種類與夫致病之根源及變遷之情狀並詢其歷來服藥之誤否然後廣求古今以來治此症之方選擇其風上種種治法次第施之又時時消息其效否而神明變通之則痼疾或有可愈之理若徒執數首通治之方屢試不效其計遂窮未有不誤者也故治大症必學問深博心思精敏又專心久治乃能奏效世又有極重極久之病諸藥罔效忽服極輕淡之方而愈此乃其病本有專治之方從前皆系誤治忽遇對症之藥自然應手而痊也愈病有日期論治病之法自當欲其速愈世之論者皆以為治早而藥中病則愈速治緩而藥不中病則愈遲此常民然亦有不論治之遲早而愈期有一定者內經臟氣法時論云夫邪氣之客於身也以勝相加至其所生而愈至其所不勝而甚至其所生而持自得其位而起其他言病愈之期不一傷寒論云發於陽者七日愈發於陰者六日愈又云風家表解而不了了者十二日愈此皆宜靜養調攝以待之不可亂投藥石若以其不愈或多方以取效或更用重劑以希功即使不誤藥力勝而元氣反傷更或有不對症之藥不惟無益反有大害此所宜知也況本源之病必待其精神漸復精民有驟長之理至於外科則起發成膿生肌收口亦如痘症有一定之日期治之而誤固有遷延生變者若欲強之有速效則如揠苗助長其害有不可勝言者乃病家醫家皆不知之醫者投藥不效自疑為未當又以別方試之不知前方實無所害特時未至耳乃反誤試諸藥愈換而病愈重病家以醫者久而不效更換他醫他醫遍閲前方知其不效亦復更換他藥愈治愈遠由是斷斷不死之病亦不救矣此皆由不知病愈有日期之故也夫病家不足責為醫者豈可不知而輕以人嘗試乎若醫者審知之而病家必責我以近效則當明告之故決定所愈之期倘或不信必欲醫者另立良方則以和平輕淡之藥姑以應病者之求待其自愈如更不信則力辭之斷不可徇人情而至於人如此則病家一時或反怨謗以後其言果驗則亦知我識高而品崇矣治人必考其驗否論天下之事惟以口舌爭而無從考其信否者則是非難定若夫醫則有效驗之可徵知之最易而為醫者自審其工拙亦最易然而世之擇醫者與為醫者皆憒憒而莫之辨何也古人用藥苟非宿病痼疾其效甚速內經云一劑知二劑已又云覆杯而臥傷寒論云一服愈者不必盡劑可見古人審病精而用藥當未有不一二劑而效者故治病之法必宜先立醫案指為何病所本何方方中用某藥專治某症其論説本之何書服此藥後於何時減去所患之何病倘或不驗必求所以不驗之故而更思必效之法或所期之效不應反有他效必求其所以致他效之故又或反增他症或病反重則必求所以致害之故而自痛懲焉更復博考醫書期於必愈而止若其病本不能速效或其病只可小效或竟不可治亦必預立醫案明著其説然後立方不得冒昧施治如此自考自然有過必知加以渚心好學其道日進矣今之醫者事事反此惟記方數首擇時這藥數種不論何病何證總以此塞責偶爾得效自以為功其或無效或至於死亦諉於病勢之常病家亦相循為固然全不一怪間有病家於未服藥之前問醫者服此藥之後效驗若何醫者答云且看服後何如豈有預期之理病家亦唯唯自以為失言何其愚也若醫者能以此法自考必成良醫病家以此法考醫者必不為庸醫之所誤兩有所益也防微論病之始生淺則易治久而深入則難治內經云聖人不治已病治未病夫病已成而藥之譬猶渴而穿井鬥而鑄兵不亦晚乎傷寒論序云時氣不和便當早言尋其邪由及在腠理以時治之罕有不愈患人忍之數日乃説邪氣入臟則難可制昔扁鵲齊桓公云病在腠理三見之後則已入臟不可治療而逃矣歷聖相傳如同一轍蓋病之始入風寒既淺氣血臟腑未傷自然治之甚易至於邪氣深入則邪氣與正氣相亂欲攻邪則礙正欲扶正則助邪即使邪漸去而正氣已不支矣若夫得病之後更或勞動感風傷氣傷食謂之病後加病尤極危殆所以人之患病在客館道途得者往往難治非所得之平凡獨重也乃既病之後不能如在家之安適而及早治之又復勞動感冒致病深入而難治也故凡人少有不適必當即時調治斷不可忽為小病以致漸深更不可勉強支持使病更增以貽無窮之害此則凡人所當深省而醫者亦必詢明其得病之故更加意體察也知病必先知症論凡一病必有數症有病同症異者有症同病異者有症與病相因者有症與病不相因者蓋合之則曰病分之則曰症古方以一藥治一症合數症而成病即合數藥而成方其中亦有以一藥治幾症者有合幾藥而治一症者又有同此一症因不同用藥亦異變化無窮其淺近易知者哪吐逆用黃連半夏不寐用棗仁茯神之類人皆知之至於零雜之症如內經所載喘滿噫語吞欠嚏嘔笑泣目瞑嗌乾心懸善恐涎下涕出齧唇齧舌善忘善怒喜握多夢嘔酸魄汗等症不可勝計或由司天運氣或由臟腑生克或由邪氣傳變內經言之最詳後之醫者病之總名亦不能知安能於一病之中辨明衆症之淵源即使病者身受其苦備細言之而彼實茫然不知古人以何藥為治仍以泛常不切之品應命並有用相反之藥以益其疾者此病者之所以無門可告也學醫者當熟讀內經每症究其緣由詳其情狀辨其異同審其真偽然後遍考方書本草詳求古人治法一遇其症應手輒愈不知者以為神奇其實古聖皆有成法也補藥可通融論古人病愈之後即令食五穀以養之則元氣自復無所謂補藥也神農仲景之書豈有補益之方哉間有別載他書者皆託名也自唐千金翼等方出始以養性補益等各立一門遂開後世補養服食之法以後醫家凡屬體虛病後之人必立補方以為調理善後之計若富貴之人則必常服補藥以供勞心縱欲之資而醫家必百計取媚以順其意其藥專取貴重辛熱為主無非參朮地黃桂附鹿茸之類託名祕方異傳其氣體合宜者一時取效久之必得風痹陰痼等疾隱受其害雖死不悔此等害人之説固不足論至體虛病後補藥之方自當因人而施視臟腑之所偏而損益之其藥亦不外陰陽氣血擇和平之藥靈敏十種相為出入不必如治病之法一味不可移易也故立方只問其陰陽臟腑何者專重而已況膏丸合就必經月經時而後服完若必每日視脈察色而後服藥則必須一日換一丸方矣故凡服補藥皆可通融者也其有神其説過為艱難慎重取貴僻之藥以可以卻病長生者非其人本愚昧即欲以之欺人耳輕藥愈病論古諺有不服藥為中醫之説自宋以前已有這蓋因醫道失傳治人多誤病者又不能辨醫之高下故不服藥雖不能愈病亦不至為藥所殺況病苟非死症外感漸退內傷漸復亦能自愈故云中醫此過於小心之法也而我以為病之在人有不治自愈者有不治難愈者有不治竟不愈而死者其自愈之徉誠不必服藥若難愈及不愈之疾固當服藥乃不能知醫之高下藥之當否不敢以身嘗試則莫若擇平易輕淺有益無損之方以備酌用小誤亦無害對病有奇功此則不止於中醫矣如偶感風寒則用蔥白蘇葉湯取微汗偶傷飲食則用山楂麥芽等湯消食偶感暑氣則用六一散廣藿湯清暑偶傷風熱則用燈心竹葉湯清火偶患腹瀉則用陳茶佛手湯和腸胃如此之類不一而足即使少誤必無大害又有其藥似平常而竟有大誤者不可不知如腹痛嘔逆之症寒亦有之熱亦有之暑氣觸穢亦有之或見此症而飲以生薑湯如果屬寒不散寒而用生薑熱性之藥至寒氣相鬥已非正治然猶有得效之理其餘三症飲之必危曾見有人中暑而服濃薑湯一碗覆杯即死若服紫蘇湯寒即立散暑熱亦無害蓋紫蘇性發散不拘何症皆能散也故雖極淺之藥而亦有深義存焉此又所宜慎也凡人偶有小疾能擇藥性之最輕淡淡者隨症飲之則服藥而無服藥之誤不服藥而有服藥之功亦養生者所當深考也腹內癰論古之醫者無分內外又學有根柢故能無病不識後世內外科既分則顯然為內證者內科治之顯然為外證者外科治之其有病在腹中內外未顯然者則各執一説各擬一方歷試諸藥皆無效驗輕者變重重者即殞矣此等證不特外科當知之即內科亦不可不辨明真確知非己責即勿施治毋至臨危束手而後委他人也腹內之癰有數證有肺癰有肝癰有胃脘癰有小腸癰有大腸癰有膀胱癰惟肺癰咳吐腥痰人猶易辨余者或以為痞結或以為瘀血或以為寒痰或以為食積醫藥雜投及至成膿治已無及並有不及成膿而死者病者醫者始終不知何以致死比比然也今先辨明痞結瘀血寒痰食積之狀凡痞結瘀血必有所因且由漸而成寒痰則痛止無定又必另現痰症食積則必有受傷之日且三五日後大便通即散惟外症則痛有常所而遷延益甚金匱云諸脈浮數當發熱而反淅淅惡寒若有痛處當發其癰以手按腫上熱者有膿不熱者無膿此數句乃內癰真諦也又云腸癰之為病身甲錯腹皮急按之濡如腫狀腹無積聚身無熱是也若肝癰則脅內隱隱痛日久亦吐膿血小腸癰與大腸相似而位略高膀胱癰則痛在少腹之下近毛際著皮即痛小便亦艱而痛胃脘癰則有虛實二種其實者易消若成膿必大吐膿血而愈惟虛症則多不治先胃中痛脹久而心下漸高其堅如石或有寒熱飲食不進按之成痛形體枯瘦此乃思慮傷脾之症不待癰成即死故凡腹中有一定痛處惡寒倦臥不能食者皆當審察防成內癰甚毋因循求治於不明之人以至久而膿潰自傷其生也圍藥論外科之法最重外治而外治之中尤當圍藥凡毒之所最得散大而頂不高蓋人之一身豈能無七情六欲之伏火風寒暑濕之留邪食飲痰涎之積毒身無所病皆散處退藏氣血一聚而成癰腫則諸邪四面皆會惟圍藥能截之使不並合則周身之火毒不至矣其已聚之毒不能透出皮膚勢必四布為害惟圍藥能束之使不散漫則氣聚而外泄矣如此則形小頂高易膿易潰矣故外治中之圍藥較之他藥為特重不但初起為然即成膿收口始終賴之一日不可缺若世醫之圍藥不過三黃散之類每試不效所以皆云圍藥無用如有既破之後而仍用圍藥者則群然笑之故極輕之毒往往至於散越而不可收拾者皆不用圍藥之故也至於圍藥之方亦甚廣博大段以消痰拔毒束肌收火為主而寒熱攻提和平猛厲則當隨症去取世人不深求至理而反輕議圍藥之非安望其術之能工也書論附科難經論難經非經也以經文之難解者設為問難以明之故曰難經言以經文以難而釋之也是書之旨蓋欲推本經旨發揮至道剖晰疑義垂示後學真讀內經之津梁也但其中亦有未盡善者其問答之詞有即引經文以釋之者經文本目明顯引之或反遺其要以至經語反晦或則無所發明或則與兩經相背或則以此誤彼此其所短也內中有自出機杼發揮妙道未嘗見於內經而實能顯內經之奧義補內經之所未發此蓋別有師承足與內經並垂千古不知創自越人乎抑上古亦有此書而越人引以為證乎自隋唐以來其書盛著尊崇之者固多而無能駁正之者蓋業醫之輩讀難經而識其大義已為醫道中傑出之流安能更深考內經求箕異同得失乎古今流傳之載籍凡有舛誤後人無敢議者比比然也獨難經乎哉余詳余所著難經經釋中傷寒論論仲景傷寒論編次者不下數十家因致聚訟紛紜此皆不知仲景作書之旨故也觀傷寒敘所述乃為庸醫誤治而設所以正治之法一經不過三四條余皆救誤之法故其文亦變動不居讀傷寒論者知此書皆設想懸擬之書則無往不得其義矣今人必改叔和之次序或以此條在前或以此條在後或以此症因彼症而生或以此經因彼經而變互相詬厲孰知病變萬端傳經無定古人因病以施方無編方以待病其原本次序既已散亡庶幾叔和所定為可信何則叔和序例云今搜採仲景舊論録其症候診脈聲色對病真方有神驗者擬防世急則此書乃叔和所搜集而世人輒加辨駁以為原本不如此抑思苟無叔和安有此書且諸人所編果能合仲景原文否耶夫六經現症有異有同後人見陽經一症雜於陰經之中以為宜改入陽經之內不知陰經亦有此症也人各是其私反致古人圓機活法泯沒不可聞矣凡讀書能得書中之精義要訣歷歷分明則任其顛倒錯亂而我心自能剌會貫通否則徒以古羽紛更互異愈改愈晦矣金匱論金匱要略乃仲景治雜病之書也其中缺略處頗多而上古聖人以湯液治病之法惟賴此書之存乃方書之祖也其論病皆本於內經而神明變化之其用藥悉本於神農本草而融會貫通之其方則皆上古聖人歷代相傳之經方仲景間有隨症加減之法其脈法亦皆內經及歷代相傳之真訣其治病無不精切周到無一毫遊移參錯之處實能洞見本源審察毫末故所投必效如桴鼓之相應真乃醫方之經也惜其所載諸病未能全備未知有殘缺與否然諸大症之綱領亦已粗備後之學者以其為經而參考推廣之已思過半矣自此以後之書皆非古聖相傳之真訣僅自成一家不可與金匱並列也脈經論王叔和著脈經分門別類條分縷晰其原亦本內經而漢以後之説一無所遺其中旨趣亦不能劃一使人有所執持然其彙集群言使後世有所考見亦不可少之作也愚按脈之為道不過驗其血氣之盛衰寒熱和邪氣之流在何經何臟與所現之症參觀互考以究其生克順逆之理而後吉凶可憑所以內經難經及仲景之論脈其立論反若甚疏而應驗如神若執脈經之説以為某病當見某脈某脈當得某病雖內經亦間有之不如是之拘泥繁瑣也試而不驗於是或咎脈之不準或咎病之非真或咎方藥之不對症而不知皆非也蓋病有與脈相合者有與脈不相合者兼有與脈相反者同一脈也見於此症為宜見於彼症為不宜同一症也見某脈為宜見某脈為不宜一病可見數十脈一脈可現數百症變動不拘若泥定一説則從脈而症不合從症而脈又不合反令人倣徨無所適從所以古今論脈之家彼此互異是非各別人持一論得失相半總由不知變通之精義所以愈密而愈疏也讀脈經者知古業談脈之詳密如此因以考其異同辨其得失審其真偽窮其變通則自有心得若欲泥脈以治病必至全無把握學者必當先參於內經難經及仲景之説而貫通之則胸中先有定見後人之論皆足以廣我之見聞而識力愈真此讀脈經之法也千金方外臺論仲景之學至唐而一變仲景之治病其論臟腑經絡病情傳變悉本內經而其所用之方皆古聖相傳之經方並非私心自造間有加減必有所本其分兩輕重皆有法度其藥悉本於神農本草無一味遊移假借之處非此方不能治此病非此藥不能成此方粗微深妙不可思議藥味不過五六品而功用無不周此乃天地之化機聖人之妙用與天地同不朽者也千金方則不然其所論病未嘗不依內經而不無雜以後世臆度之説其所用方亦皆採擇古方不無兼取後世偏雜之法其所用藥未必全本於神農兼取雜方單方及通治之品故有一病而立數方亦有一方而治數病其藥品有多至數十味者其中對症者固多不對症者亦不少故治病亦有效有不效大抵所重專在於藥而古聖制方之法不傳矣此醫道之一大變也然其用藥之奇用意之巧亦自成一家有不可磨滅之處至唐王燾所集外臺一書則纂集自漢以來諸方匯萃成書而歷代之方於焉大備但其人本非專家之學故無所審擇以為指歸乃醫方之類書也然唐以前之方賴此書以存其攻亦不可泯但讀之者苟胸中無成竹則衆説紛紜群方淆雜反茫然失其所據故讀千金外臺者必精通於內經仲景本草等書胸中先有成見而後取其長而舍其短則可資我博深之益否則反亂人意而無所適從嗟乎千金外臺且然況後世偏駁雜亂之書能不惑人之心志哉等而下之更有無稽杜撰之邪書尤不足道矣活人書論宋人之書能發明傷寒論使人所執持而易曉大有功於仲景者活人書為第一蓋傷寒論不過隨舉六經所現之症以施治有一症而六經皆現者並有一症而治法迥別者則讀者茫無把握矣此書以經絡病因傳為疑似條分縷析而後附以諸方治法使人一覽瞭然豈非後學之津梁乎其書獨出機杼又能全本經文無一定混入己意豈非好學深思述而不作足以繼往開來者乎後世之述傷寒論者唐宋以來已有將經文刪改移易不明不貫至近代前條辨尚論編等書又復倒顛錯亂各逞意見互相辨駁總由分症不清欲其強合所以日就支離若能參究此書則任病情之錯綜反覆而治法乃歸一定何必聚訟紛紜致古人之書愈講而愈晦也太素脈論診脈以之治病其血氣之盛衰及風寒暑濕之中人可驗而知也乃相傳有太素脈之説以候人之壽夭窮通智愚善惡纖悉皆備夫脈乃氣血之見端其長而臺厚者為壽之徵其短小而薄弱者為夭之徵清而有神為智之徵濁而無神為愚之徵理或宜然若善惡已不可知窮通則與脈何與然或得壽之脈而其人或不謹於風寒勞倦患病而死得夭之脈而其人愛護調攝得以永年又有血氣甚清而神志昏濁者形質甚濁而神志清明者即壽夭智愚亦不能皆驗況其他乎又書中更神其説以為能知某年得某官某年得財若干父母何人子孫何若則更荒唐矣天下或有習此術而言多驗者此必別有他術以推測而幸中藉此以神其説耳若盡於脈見之斷斷無是理也婦科論婦人之疾與男子無異惟經期胎産之病不同並多癥瘕之疾其所以多癥瘕之故亦以經帶胎産之血易於凝滯故較之男子為多故古人名婦科謂之帶下醫以其病總屬於帶下也主治婦人必先明衝任之脈衝脈起於氣街在毛際兩旁並少陰之經兵臍上行至胸中而散任脈起於中極之下臍下四寸以上毛際循腹裡上關元又云衝任脈皆起於胞中上循背裡為經脈之海此皆血之所從生而胎之所由系明於衝任之故則本原洞悉而後其所生之病千條萬緒以可知其所從起更參合古人所用之方而神明變化之則每症必有傳受不概治以男子泛用之藥自能所治輒效矣至於如俗相傳之邪如胎前宜涼産後宜溫等論夫胎前宜涼理或有之若産後宜溫則脫血之後陰氣大傷孤陽獨熾又瘀血未結為蘊熱乃反用薑桂等藥我見時醫以此殺人無數觀仲景先生於産後之疾以石膏白薇竹茹等藥治之無不神效或云産後瘀血得寒則凝得熱則行此大謬也凡瘀血凝結因熱而凝者得寒降而解因寒而凝者得熱降而解如桃仁承氣湯非寒散而何未聞此湯能凝血也蓋産後瘀血熱結為多熱瘀成塊更益以熱則煉成乾血永無解散之日其重者陰涸而即死輕者成堅反宗後人之邪説皆足以害人諸科皆然不獨婦科也痘科論今天之醫法失傳者莫如痘疹痘之源藏於臟腑骨脈而發於天時所謂本於臟腑骨脈者凡人受生之初陰陽二氣交感成形其始因火而動則必有渣滓未融之處伏於臟腑骨脈之中此痘之本源也然外無感召則伏而不出及天地寒暑陰陽之氣沴戾日積與人身之臟腑氣血相尖則其毒隨之而越此發於天時者也而天時有五運六氣之殊標本勝復之異氣體既稟受不同感發又隨時各別則治法必能通乎造化之理而補救之此至精至微之術也奈何以寒涼伐之毒藥劫之哉夫痘之源不外乎火固也然內經云火鬱則發之其遇天時炎熱火甚易發者清解固宜若冬春之際氣為寒束則不起發發而精血不充則無漿漿而精血不繼即不靨則溫散提托補養之法缺一不可豈得概用寒涼至其用蚯蚓桑蟲生蠍等毒藥為禍尤烈夫以毒攻毒者謂毒氣內陷一時不能托出則借其力以透發之此綿危篤之症千百中不得一者乃視為常用之藥則無毒者反益其毒矣病家因其能知死期故死而不怨孰知服彼之藥無有不死非其識見之高乃其用藥之靈也故之生死全賴氣血當清火解毒者則清火解毒當培養氣血者則溫托滋百不失一矣嗚呼廖説流傳起於明季至今尤甚惟以寒藥數品按日定方不效則繼以毒藥如此而已夫以至變至微之病而立至定至粗之法於是群以為痘科最易不知殺人亦最多也附種痘説種痘之法此仙傳也有九善焉凡物欲其聚惟痘不欲其聚痘未出而強之出則毒不聚一也凡物欲其説痘欲其少強之出必少二也凡物欲其大痘欲其小強之出必小三也不感時痘之戾氣四也擇天地溫和之日五也擇小兒無他病之時六也其痘苗皆取種出無毒之善種七也凡痘必漿成十分而後毒不陷種痘之漿五分以上即無害八也凡痘必十二朝成靨並有延至一月者種痘則九朝已回九也其有種而死者深用悔恨不知種而死者則自出斷無不死之理不必悔也至於種出危險之痘或生痘毒此則醫家不能用藥之故種痘之人更能略知治痘之法則尤為十全矣幼科論幼科古主謂之啞科以其不能言而不知病之所在也此特其一端耳幼科之病如變蒸胎驚之類與成人異者不可勝舉非若婦人之與男子異者只經産數端耳古人所以另立專科其説精詳明備自初生以至成童其病名不帝以百計其治法立方種種各別又婦人之與男子病相同者治亦相同若小兒與之成人即病相同者治亦迥異如傷食之症反有用巴豆硼砂其餘諸症多用金石峻厲之藥特分兩極少耳此古人真傳也後世不敢用而以草木和平之藥治之往往遷延而死此醫者失傳之故至於調攝之法病家能知之者千不得一蓋小兒純陽之體最宜清涼今人非太暖即太飽而其尤害者則在於有病之後而數與之乳乳之為物得熱則堅韌如棉絮況兒有病則食乳甚稀乳久不食則愈棄滿一與之吮則迅疾湧出較平日之下咽更多前乳未消新乳復充填積胃口化為頑痰痰火相結諸脈皆閉而死矣譬如常人平日食飯幾何當病危之時其食與平時不減安有不死者哉然囑病家云乳不可食則群相詬曰乳猶水也食之何害況兒虛如此全賴乳養若復禁乳則餓死矣不但不肯信反將醫者詬罵其餘之不當食而食與當食而反不與之食種種失宜不可枚舉醫者豈能坐守之使事事合節耶況明理之醫能知調養之法者亦百不得一故小兒之所以難治者非盡不能言之故也瘍科論瘍科之法全在外治其手法必有傳授凡辨形察色以知吉凶及先後施治皆有成法必讀書臨證二者皆到然後無誤其升降圍點去腐生肌呼膿止血膏塗洗尉等方皆必純正和平復屢試屢驗者乃能應手而愈至於內服之方護心托毒化膿長肉亦有真傳非尋常經方所能奏效也惟煎方則必視其人之強弱陰陽而為加減此則必通於內科之理全在學問根柢然又與內科不同蓋煎方之道相同而其藥則有某毒主某藥某證主某方非此不效亦另有傳授焉故外科總以傳授為主徒恃學問之宏博無益也有傳授則較之內科為尤易惟外科而兼內科之症或其人本有宿疾或患外症之時復感他氣或因外症重極內傷臟腑則不得不兼內科之法治之此必平日講於內科之道而通其理然後能兩全而無失若不能治其內症則並外症亦不可救此則全在學問深博矣若為外科者不能兼則當另請名理內科為之定方而為外科者參議於其間使其藥與外症無害而後斟酌施治則庶幾兩有所益若其所現內症本因外症而生如痛極而昏暈膿欲成而生寒熱毒內陷而脹滿此則內症皆由外症而生只治其外症而內症已愈此必商之內科也但其道甚微其方甚衆亦非淺學者所能知也故外科之道淺言之則惟記煎方數首合膏圍藥幾科已可以自名一家若深言之則經絡臟腑氣血骨脈之理及奇病怪疾千態萬狀無不盡識其方亦無病不全其珍奇貴重難得之藥亦無所不備雖遇極奇極險之症亦瞭然無疑此則較之內科為更難故外科之等級高下懸殊而人之能識其高下者亦不易也祝由科論禍由之法內經賊風篇岐伯曰先巫知百病之勝先知其病所從生者可禍而已也又移精變氣論岐伯云古恬淡世邪不能深入故可移精禍由而已今人虛邪賊風內著五臟骨髓外傷空竅肌膚所以小病必甚大病必死故禍由不能已也由此觀之則禍由之法亦不過因其病情之所由而宣意志氣以釋疑而解惑此亦必病之輕者或有感應之理若果病機病重亦不能有效也古法今已不傳近所傳符咒之術間有小效而病之大者全不見功蓋岐伯之時已然況後世哉存而不論可也獸醫論禽獸之病由於七情者少由於風寒飲食者多故治法較之人為尤易夫禽獸之臟腑經絡雖與人殊其受天地之血氣不甚相遠故其用藥亦與人大略相同但其氣粗血濁其所飲食非人之飲食則藥亦當別有主治不得盡以治人者治之矣如牛馬之食則當用消草之藥犬豕之食則當用消粳豆之藥是也又有專屬之品如貓宜烏藥馬宜黃藥之類而其病亦一獸有一獸獨患之病此則另有專方主治余則與人大段相同但必劑大而力厚之方取效為易其中又有天運時氣之不同變化多端亦必隨證加減此理亦廣博深奧與治人之術不相上下今則醫人之醫尚絶傳況獸醫乎古今四大家論醫道之晦久矣明人有四大家之説指張仲景劉河間李東垣朱丹溪四人謂為千古醫宗此真無知妄談也夫仲景先生乃千古集大成之聖人猶儒這孔子河間東垣乃一偏之家丹溪不過斟酌諸家之言而調停去取以開學者便易之門此乃世俗之所謂名醫也三子之於仲景未能望見萬一乃躋而與之並稱豈非絶倒如扁鵲倉公王叔和孫思邈輩則實有師承各操絶技然亦僅成一家之言如儒家漢唐諸子之流亦斷斷不可與也子並列況三人哉至三人之高下劉則專崇內經而實不能得其精義朱則平易淺近未睹本原至於東垣執專理脾胃之説純用升提香燥意見偏而方法亂貽誤後人與仲景正相反後世頗宗其説皆由世人之於醫理全未夢見所以為所惑也更可駭者以仲景有傷寒論一書則以為專明傷寒金匱要略則以為不可依以治病其説荒唐更甚吾非故欲輕三子也蓋此説行則天下惟知三子之緒餘而不深求仲景之學則仲景延續先聖之法從此日衰而天下萬世夭扎載途其害不少故當亟正之也醫家論醫之高不齊此不可勉強者也然果能智竭謀小心謹慎猶不人更加以詐偽萬端其害不可窮矣或立奇方以取異或用僻藥以惑衆或用參茸補熱之藥以媚富貴之人或假託仙佛之方以欺愚魯之輩或立高談怪論驚世盜名或造假經偽説瞞人駭俗或明知此病易曉偽説彼病以示奇如冬月傷寒強加香薷於傷寒方內而愈以為此暑病也不知香薷乃其惑人之法也如本系熱症強加乾薑於涼藥之內而愈以為此真寒也不知彼之乾薑乃泡過百次而無味者也於外科則多用現成之藥尤不可辨其立心尤險先使其瘡極大令人驚惶而後治之並有能發不能收以至斃者又有偶得一方或五灰膏三品一條槍之灰不顧人之極痛一概用之哀號欲死全無憐憫之心此等之人不過欲欺人圖利即使能知一二亦為私欲所汨沒安能奏功故醫者能正其心術雖學不足猶不至於害人況果能虛心篤學則學日進學日進則每治必愈而聲名日起自然求之者衆而利亦隨之若專於求利則名利祕兩失醫者何苦舍此而蹈彼也醫學淵源論醫學之最古者內經則醫之祖乃岐黃也然本草起於神農則又在黃帝這前矣可知醫之起起於藥也至黃帝則講夫經絡臟腑之原內傷外感之異與夫君臣佐使大小奇偶之制神明夫用藥之理醫學從此大備然其書講人身臟腑之形七情六淫之感與針灸雜法為多而制方尚少至伊有湯液治病之法然亦得之傳聞無成書可考至刻苦鵲倉公而湯藥之用漸廣張仲景先生出而雜病傷寒專以方藥為治遂為千古用方之祖而其方亦俱原本神農黃帝之精義皆從相傳之方仲景不過集其成耳自是之後醫者以方藥為重其於天地陰陽經絡臟腑之道及針灸雜術往往不甚考求而治病之法從此一變唐宋以後相尋彌甚至元之劉河間張潔古等出未嘗不重內經之學凡論病必先敘經而後採取諸家之説繼乃附以治法似為得旨然其人皆非通儒不能深通經義而於仲景制方之義又不能深考其源故其説非影響即支雜各任其偏而不歸於中道其尤偏駁者李東垣為甚惟以溫燥脾胃為主其方亦毫無法度因當時無真實之學盜竊虛名故其教至今不絶至明之薛立齋尤浮泛荒謬猶聖賢之學變而為腐爛時文何嘗不曰我明經學古者也然以施之治天下果能如唐虞三代者乎既不知神農黃帝之精義則藥性及臟腑經絡之源不明也又不知仲景制方之法度則病變及施治之法不審也惟曰某病則用某方如不效改用某方更有一方服至二三十劑令病者遷延自愈者胸中毫無把握惟以簡易為主自此以降流弊日甚而枉死載途矣安得有參本草窮內經熟金匱傷寒者出而挽救其弊全民命乎其害總由於習醫者皆貧苦不學之人專以此求衣食故只記數方遂以之治天下之病不復更求他法故其禍遂至於此也考試醫學論醫學人命所關故周禮醫師之屬掌於冢宰歲終必稽其事而制其食至宋神宗時設內外醫學置教授及諸生皆分科考察升補元亦仿而行之其考試之文皆有程式未知當時得人何如然其慎重醫道之意未嘗異也故當時立方治病猶有法度後世醫者大概皆讀書不就商賈無資不得已而為衣食之計或偶涉獵肆中剿襲醫書或託名近地時醫門下始則欲以欺人久之亦自以醫術不過如此其誤相仍其害無盡岐黃之精義幾絶矣若欲斟酌古今考試之法必訪求世之實有師承學問淵博品行端方之醫如宋之教授令其嚴考諸醫取其許挂牌行道既行之後亦復每月嚴課或有學問荒疏治法廖誤者小則撤牌讀書大則飭使改業教授以上亦如周禮醫師之有等其有學問出衆治效神妙者候補教授其考試之法分為六科曰針灸曰大方曰婦科曰幼科兼痘科曰眼科曰外科其能諸科皆通者曰全科通一二科者曰兼科通一科者曰專科其試題之體有三一曰論題出靈樞素問發明經絡臟腑五運六氣寒熱虛實補瀉逆從之理二曰解題出神農本草傷寒論金匱要略考訂藥性病變制方之法三曰案自述平日治病之驗否及其所以用此方治此病之意如此考察自然言必本於聖經治必遵乎古法學有淵源而師承不絶矣豈可聽涉獵杜撰全無根柢之人以人命為兒戲乎醫非人人可學論今之學醫者皆無聊之甚習此業以為及食計耳孰知醫之為道乃古聖人所以泄天地之祕奪造化之權以救人之死其理精妙入神非聰明敏哲之人不可學也黃帝神農越人仲景之書文詞古奧披羅廣遠非淵博通達之人不可學也凡病情之傳變在於頃刻真偽一時難辨一或執滯生死立判非虛懷靈變之人不可學也病名以千計病證以萬計臟腑經絡內服外治方藥之書數年不能竟其説非勤讀善記之人不可學也又內經以後支分派別人自為師不無偏駁更有怪僻之論鄙俚之説紛陳錯立淆惑百端一或誤信終身不返非精鑑確識之人不可學也故為此道者必具過人之資通人之識又能屏去俗事專心數年更得師之傳授方能與古聖人之心潛通默契若今之學醫者與前數端事事相反以通儒畢世不能工之事乃以無文理之人欲頃刻而能之宜道之所以日喪而枉死者遍天下也名醫不可為論為醫固難而為名醫尤難何則名醫者聲價甚高敦請不易即使有力可延又恐往而不遇即或可遇其居必非近地不能旦夕可至故病家凡屬輕小之疾不即延治必病勢危篤近醫束手舉家以為危然後求之夫病勢而人人以為危則真危矣又其病必遷延日久屢易醫家廣試藥石一誤再誤病情數變已成壞證為名醫者豈真有起死回生之術哉病家不明此理以為如此大名必有回天之力若亦如他醫之束手亦何以異於人哉於是望之甚切責之甚重若真能操人生死之權者則當之者難為情矣若此病斷然必死則明示以不治之故定之死期飄然而去猶可免責倘此症萬死之中猶有生機一線若用輕劑以塞責致病人萬無生理則於心不安若用重劑以背城一戰萬一有變則謗議蜂起前人誤治之責盡歸一人雖當定方之時未嘗不明白言之然人情總以成敗為是非既含我之藥而死其咎不容諉矣又或大病瘥後無氣虛而餘邪尚伏善後之圖尤宜深講病家不知失於調理愈後復發仍有歸咎於醫之未善者此類甚多故名醫之治病較之常醫倍難也知其難則醫者固宜慎之又慎而病家及旁觀之人亦宜曲諒也然世又有獲虛名之時醫到處誤人而病家反云此人治之而不愈是亦命也有殺人之實無殺人之名此必其人別有巧術以致之不在常情之內矣邪説陷溺論古聖相傳之説揆之於情有至理驗之於疾有奇效然天下之人反甚疑焉而獨於無稽之談義所難通害又立見者人人奉以為典訓守之不敢失者何也其所由來久矣時醫之言曰古方不可以治今病嗟乎天地之風寒暑濕燥火猶是也生人七情六欲猶是也而何以古人用之則生今人用之則死不知古人之以某方治某病者先審其病之確然然後以其方治之若今人之所謂某病非古人之所謂某病也如風火雜感症類傷寒實非傷寒也乃亦以大劑桂枝湯汗之重者吐血狂躁輕者身熱悶亂於是罪及仲景以為桂枝湯不可用不自咎其辨病之不的而咎古方之誤人豈不謬乎所謂無稽之邪説如深秋不可用白虎白虎乃傷寒陽膽之藥傷寒皆在冬至以後尚且用之何以深秋已不可用又謂痢疾血症皆無止法夫痢血之病屬實邪有瘀者誠不可以遽止至於滑脫空竭非止不為功但不可塞其火邪耳又謂餓不死之傷寒吃不死之痢疾夫傷寒論中以能食不能食驗中寒中風之別其中以食不食辨證之法不一而足況邪方退非扶其胃氣則病變必多宿食欲行非新谷入胃則腸中之氣必不下達但不可過用耳執餓不死之説而傷寒之禁其食而餓死者多矣胃痢疾為吃不殺者乃指人之患痢非噤口而能食者則其胃氣尚強其病不死故云然非謂痢疾之人無物不可食執吃不殺之説而痢疾之過食而死者多矣此皆無稽之談不可枚舉又有近理之説而謬解之者亦足為害故凡讀書議論必審其所以然之故而更精思歷試方不為邪説所誤故聖人深惡夫道聽塗説之人也涉獵醫書誤人論人之死誤於醫家者十之三誤於病家者十之三誤於旁人涉獨醫者亦十之三蓋醫之為道乃通天徹地之學必全體明而後可以治一病若全體不明而偶得一知半解舉以試人輕淺之病或能得效至於重大疑難之症亦以一偏之見妄議用藥一或有誤生死立判矣間或偶然幸中自以為如此大病猶能見功益復自信以後不拘何病輒妄加議論至殺人之後猶以為病自不治非我之過於是終身害人而不悔矣然病家往往多信之者則有故焉蓋病家皆不知醫之人而醫者寫方即去見有稍知醫理者議論鑿鑿又關切異常情面甚重自然聽信誰知彼乃偶然翻閲及道聽途説之談彼亦未嘗審度從我之説病者如何究竟而病家已從之矣又有文人墨客及富貴之人文理本優偶爾檢點醫書自以為已有心得旁人因其平日稍有學問品望倍加信從而世之醫人因自己全無根柢辨難反出其下於是深加佩服彼以為某乃名醫尚不如我遂肆然為人治病愈則為功死則無罪更有執一偏之見恃其文理之長更著書立説貽害後世此等之人不可勝數嗟乎古之為醫者皆有師承而又無病不講無方不通一有邪説異論則引經據典以折之又能實有把持所治必中故餘人不得而矣其末議今之醫者皆全無本領一書不讀故涉獵醫書之人反出而臨乎其上致病家亦鄙薄醫者而反信夫涉獵之人以致害人如此此其咎全在醫中之無人故人人得而操其長短也然涉獵之人久而自信益真始誤他人繼誤骨肉終則自誤其身我見甚多不可不深省也病家論天下之病誤於醫家者固多誤於病家者尤多醫家而易良醫可也病家而誤其弊不可勝窮遙不問醫之高下即延以治病其誤一也有以耳為目聞人譽某醫即信為真不考其實其誤二也有平日相熟之人務取其便又慮別延他人覺情面有虧而其人又叨任不辭希圖酬謝古人所謂以性命當人情其誤三也有遠方邪人假稱名醫高談闊論欺騙愚人遂不復詳察信其欺妄其誤四也有因至親密友或勢位之人薦引一人情分難卻勉強延請其誤五也更有病家戚友偶閲醫書自以為醫書頗通每見立方必妄生議論私改藥味善則歸己過則歸人或各薦一醫互相毀謗遂成黨援甚者各立門戶如不人己反幸災樂禍以期必勝不顧病者之死生其誤七也又或病勢方轉未收全功病者正疑見效太遲忽而讒言蜂起中道變更又換他醫遂至危篤反咎前人其誤八也又有病變不常朝當桂附暮當芩連又有純虛之體其證反宜用硝黃大實之人其證反宜用參術病家不知以為怪僻不從其説反信庸醫其誤九也又有吝惜錢財惟賤是取況名醫皆自作主張不肯從我反不若某某等和易近人柔順受商酬謝可略扁鵲云輕身重財不治其誤十也此猶其大端耳其中更有用參附則喜用攻劑則懼服參附而死則委之命服攻伐而死則咎在醫使醫者不敢過症用藥更有製藥不如法煎藥不合度服藥非其時更或飲食起居寒暖勞逸喜怒語言不進不節難以枚舉小病無害若大病則有一不合皆足以傷生然則為病家者當何如在謹擇名醫而信任之如人君之用宰相擇賢相而專任之其理一也然則擇賢之法若何曰必擇其人品端方心術純正又詢其學有根柢術有淵源歷考所治果能十全八九而後延請施治然醫各有所長或今所患非其所長則又有誤必細聽其所論切中病情和平正大又用藥必能命中然後托之所謂命中者其立方之時先論定此方所以然之故服藥之後如何效驗或云必得幾劑而後有效其言無一不驗此所謂命中也如此試醫思過半矣若其人本無足取而其説又怪僻不經或遊移恍惚用藥之後與其所言全不相應則即當另覓名家不得以性命輕試此則擇醫之法也醫者誤人無罪論人命所關亦大矣凡害人之命者無不立有報應乃今之為名醫者既無學問又無師授兼以心術不正欺世盜名害人無算宜有天罰以彰其罪然往往壽考富厚子孫繁昌全無殃咎我殆甚不解焉以後日與病者相周旋而後知人之誤藥而死半由於天命半由於病家醫者不過依違順命以成其死並非造謀之人故殺人之罪醫者不受也何以言之夫醫之妨否有一定之高下而病家則於醫之良者彼偏不信醫之劣者反信而不疑言補益者以為良醫言攻散者以為庸醫言溫熱者以為有益言清涼者以為傷生或旁人互生議論或病人自改方藥而醫者欲其術之行勢必曲從病家之意病家深喜其如順偶然或愈醫者自矜其功如其或死醫者不任其咎病家亦自作主張隱諱其非不復咎及醫人故醫者之曲從病家乃邀攻避罪之良法也既死之後聞者亦相傳以為某人之病因誤服某人之藥而死宜以為戒矣及至自己得病亦復如此更有平昔最佩服之良醫忽然自生疾病反信平日所最鄙薄之庸醫而傷其生者是必有鬼神使之此乃所謂命也蓋人生死有定數若必待人之老而自死則天下皆壽考之人而命無權故必生疾病使之不以壽而死然疾病之輕重不齊或其人善自保護則六淫七情之所感甚輕命本當死而病淺不能令其死則命又無權於是天生此等之醫分布於天下凡當死者少得微疾醫者必能令其輕者重重者死而命之權於是獨重則醫之殺人乃隱然奉天之令以行其罰不但無罪且有微功故無報也惟世又有立心欺詐賣弄聰明造捏假藥以欺嚇人而取其財者此乃有心之惡與前所論之人不同其禍無不立至我見亦多矣願天下之人細思之真鑿鑿可徵非狂談也
