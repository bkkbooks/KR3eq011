body:
  text: 自敘醫小道也精義也重任也賤工也古者大人之學將以治天下國家使無一夫不被其澤甚者天地位而萬物育斯學者之極功也若夫日救一人月治數病顧此失彼雖數十里之近不能兼及況乎不可治者又非使能起死者而使之生其道不已小乎雖然古聖人之治病也通於天地之故究乎性命之源經絡臟腑氣血骨脈洞然如見然後察其受病之由用藥以驅除而調劑之其中自有玄機妙悟不可得而言喻者蓋與造化相維其義不亦精乎道小則有志之士有所不屑為義精則無識之徒有所不能窺也人之所繫莫大乎生死王公大人聖遇豪傑可以旋轉乾坤而不能保無疾病之患一有疾病不得不聽之醫者而生殺唯命矣夫一人系天下之重而天下所繫之人其命又懸於醫者下而一國一家所繫之人更無論矣其任不亦重乎而獨是其人者又非有爵祿道德之尊父兄師保之重既非世之所隆而其人之自視亦不過為衣服口食之計雖以一介之微呼之而立至其業不甚賤乎任重則托之者必得偉人工賤則業之者必無奇士所以勢出於相違而道因之易墜也余少時頗有志於窮經而肉數人疾病連年死亡略盡於是博覽方書寢食俱廢如是數年雖無生死骨肉之方實有尋本溯源之學九折臂而成醫至今尤信而竊概唐宋以來無儒者為之振興視為下業逡巡失傳至理已失良法並亡惄焉傷懷恐自今以往不復有生人之術不揣庸妄用敷厥言倘有所補所全者或不僅一人一世已乎乾隆丁丑秋七月洞溪徐大椿書於吳山之半松書屋
