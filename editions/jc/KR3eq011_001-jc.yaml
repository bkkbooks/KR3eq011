body:
  text: 卷上經絡臟腑無氣存亡論養生者之言曰天下之人皆可以無死斯言妄也何則人生自免乳哺以後始而孩既而長既而壯日勝一日何以四十以後飲食奉養如昔而日且就衰或者曰嗜欲戕之也則絕嗜欲可以無死乎或者曰勞動賊之也則戒勞動可以無死乎或者曰思慮擾之也則屏思慮可以無死乎果能絕嗜欲戒勞動減思慮免於疾病夭札則有之其老而眊眊而死猶然也況乎四十以前未嘗無嗜欲勞苦思慮然而日生日長四十以後雖無嗜欲勞苦思慮然而日減日消此其故何歟蓋人之生也顧夏蟲而卻笑以為是物之生死何其促也而不知我實猶是耳當其受生之時已有定分焉所謂定分者元氣也視之不見求之不得附於報導血之內宰乎氣血之先其成形之時已有定分焉所謂定分者元氣也視之不見求之不得附於氣血之內宰乎氣血之先其成形這時已有定數譬如置薪於火始燃尚微漸久則烈薪力既盡而火息矣其有久暫之殊者則薪之堅脆異質也故終岙無病者待元氣之自盡而死此所謂終其天年者也至於疾病之人若元氣不傷雖病甚不死元氣或傷雖病輕亦死而其中又有辨焉有先傷元氣而病者此不可治者也有因病而傷元氣者此不可不預防者也亦有因誤治而傷及元氣者亦有元氣雖傷未甚尚可保全之者其等不一故診病決死生者不視病之輕重而視元氣之存亡則百不失一矣至所謂元氣者何所寄耶五臟有五臟之真精此元氣之分體者也而其根本所在即道經所謂丹田難經所謂命門內經所謂節節之旁中有小心陰陽合闢存乎此呼吸出入系乎此無火而能令百體皆溫無水而能令五臟皆潤此中一線未絕則生氣一線未亡皆賴此也若夫有疾病而保全之法何如蓋元氣雖自有所在然實與臟腑相連屬者也寒熱攻補不得其道則實其實而虛其虛必有一臟大受其害邪入於中而精不能續則元氣無所附而傷矣故人之一身無處不宜謹護而藥不可輕試也若夫預防之道惟上工能慮在病前不使其勢已橫而莫救使元氣克全則自能托邪於外若邪盛為害則乘元氣未動與之背城而一決勿使後事生悔此神而明之之術也若欲與造化爭權而令天下之人終不死則無是理矣軀殼經絡臟腑論凡致病必有因因受病之處則各有部位今之醫者曰病必分經絡而後治之似矣然亦知病固非經絡之所能盡者乎夫人有皮肉筋骨以成形所謂軀殼也而虛其中則有臟腑以實之其連續貫通者則有經有絡貫乎臟腑之內運乎軀殼之中為之道路以傳變周流者也故邪之傷人或在皮肉或在筋骨或在臟腑或在經絡有相傳者有不相傳者有久而相傳者有久而終不傳者其大端則中於經絡者易傳其初不在經絡或病甚而流於經絡者亦易傳經絡之病深入臟腑則以生克相傳惟皮肉筋骨之病不歸經絡者則不傳所謂軀殼之病也故識病之人當直指其病在何臟何腑何筋何骨何經何絡或傳或不傳傳以何經始以何經終其言歷歷可驗則醫之明者矣今人不問何病廖舉一經以藉口以見其頗識內經實與內經全然不解也至治之難易則在經絡易治在臟腑者難治且多死在皮肉筋骨者難治亦不易死其大端如此至於軀殼臟腑之屬於某經絡以審其針灸用藥之法則內經明言之深求自得也表裡上下論欲知病之難易先知病之淺深欲知病之淺深先知病之部位夫人身一也實有表裡上下之別焉何謂表皮肉筋骨是也何謂里臟腑精神是也而經絡則貫乎其間表之病易治而難死里之病難治而易死此其大略也而在表在裡者又各有難易此不可執一而論也若夫病本在表而傳於裡病本在裡而並及於表是為內外兼病尤不易治身半已上之病往往近於熱身半以下之病往往近於寒此其大略也而在上在下又各有寒熱此亦不可執一而論也若夫病本在上而傳於下病本在下而傳於上是之謂上下兼病亦不易治所以然者無病之處多有病之處少則精力猶可維持使正氣漸充而邪氣亦去若夫一人之身無處不病則以何者為驅病之本而復其元氣乎故善醫者知病勢之盛而必傳也預為之防無使結聚無使氾濫無使併合此上工治未病之說也若其已至於傳則必先求其本後求其標相其緩急而施治之此又桑榆之收也以此決病之生死難易思過半矣陰陽升降論人身象天地天之陽藏於地之中者謂之元陽元陽之外護者謂之浮陽浮陽則與時升降若人之陽氣則藏於腎中而四布於周身惟元陽則固守於中而不離其位故太極圖中心白圈即元陽也始終不動其分陰分陽皆在白圈之外故發汗之藥皆鼓動其浮陽出於營衛之中以泄其氣耳若元陽一動則元氣漓矣是以發汗太甚動其元陽即有亡陽之患病深之人發喘呃逆即有陽越之虞其危皆在頃刻必用參附及重鎮之藥以墜安之所以治元氣虛弱之人用升提發散之藥最防陽虛散越此第一關也至於陰氣則不患其升而患其竭竭則精液不布乾枯燥烈廉泉玉英毫無滋潤舌燥唇焦皮膚粗槁所謂天氣不降地氣不升孤陽無附害不旋踵內經云陰精所奉其人壽故陰氣有餘則上溉陽氣有餘則下固其人無病病亦易愈反此則危故醫人者慎毋越其陽而竭其陰也治病必分經絡臟腑論病之從內出者必由於臟腑病之從外入者必由於經絡其病之情狀必有鑿鑿可徵者如怔忡驚悸為心之病泄瀉膨脹為腸胃之病此易知者又有同一寒熱而六經各殊同一疼痛而筋骨皮肉各別又有臟腑有病而反現於肢節肢節有病而反現於臟腑若不究其病根所在而漫然治之則此之寒熱非彼之寒熱此之癢痛非彼之痛癢病之所在全不關著無病之處反以藥攻之內經所謂誅伐無過則故病示已新病復起醫者以其反增他病又復治其所增之病復不知病之所從來雜藥亂投愈治而病愈深矣故治病者必先分經絡臟腑之所在而又知其七情六淫所受何因然後擇何經何臟對病之藥本於古聖何方之法分毫不爽而後治之自然一劑而即見效矣今之治病不效者不咎己藥之不當而反咎病之不應藥此理絡身不悟也治病不必分經絡臟腑論病之分經絡臟腑夫人知之於是天下遂有因經絡臟腑之說而拘泥附會又或誤認穿鑿並有藉此神其說以欺人者蓋治病之法多端有必求經絡臟腑者有不必求經絡臟腑者蓋人之氣血無所不通而藥性之寒熱溫涼有毒無毒其性亦一定不移入於人身其功能亦無所不到豈有其藥止入某經之理即如參耆之類無所不補砒鴆之類無所不毒並不專於一處也所以古人有現成通治之方如紫金錠至寶丹之類所治之病甚多皆有奇效蓋通氣者無氣不通解毒者無毒不解消痰者無痰不消其中不過略有專宜耳至張潔古輩則每藥註定云獨入某經皆屬附會之談不足徵也曰然則用藥竟不必分經絡臟腑耶曰此不然也蓋人之病各有所現之處而藥之治病必有專長之功如此胡治寒熱往來能愈少陽之病桂枝治畏寒發熱能愈太陽之病葛根治肢體大熱能愈陽明之病蓋其止寒熱已畏寒除大熱此乃柴胡桂枝葛根專長之事因其能治何經之病後人即指為何經之藥孰知其功能實不僅入少陽太陽陽明也顯然者尚如此余則更無影響矣故以某藥為能治某經之平凡則可以某藥為獨治某經則不可謂某經之病當用某藥則可謂某藥不復入他經則不可故不知經絡而用藥其失也泛必無捷效執經絡而用藥其失也泥反能致害總之變化不一神而明之存乎其人也腎藏精論精藏於腎人盡知之至精何以生何以藏何以出則人不知也夫精即腎中之脂膏也有長存者有日生者腎中有藏精之處充滿不缺如井中之水日夜充盈此長存者也其欲動交媾所出之精及有病而滑脫之精乃日生者也其精施去施生不去亦不生猶井中之水日日汲之不見其虧終年不汲不見其溢易云井道不可不革故受之以革其理然也曰然則縱欲可無害乎曰是又不然蓋天下之理總歸自然有腎氣盛者多欲無傷腎氣衰者自當節養左傳云女不可近乎對曰節之若縱欲不節如淺狹之井汲之無度則枯竭矣曰然則強壯之人而絕欲則何如曰此亦無咎無譽惟腎氣略堅實耳但必浮火不動陰陽相守則可耳若浮火日動而強制之則反有害蓋精因火動而離其位則必有頭眩目赤身癢腰疼遺泄偏墜等症其者或發癰疽此強制之害也故精之為物欲動則生不動則不生能自然不動則有益強制則有害過用則衰竭任其自然而無所勉強則保精之法也老子云無法道道法自然自然之道乃長生之訣也一臟一腑先絕論人之死大約因元氣存亡而決故患病者元氣已傷即變危殆蓋元氣脫則五臟六腑皆無氣矣竟有元氣深固其根不搖而內中有一臟一腑先絕者如心絕則昏昧不知世事肝絕則喜怒無節腎絕則陽道痿縮脾絕則食入不化肺絕則氣促聲啞六腑之絕而失其所司亦然其絕之象亦必有顯然可見之處大約其氣尚存而神志精華不用事耳必明醫乃能決之又諸臟腑之中惟肺絕則死期尤促蓋肺為臟腑之華蓋臟腑賴其氣以養故此臟絕則臟腑皆無稟受矣其餘則視其絕之甚與不甚又觀其別臟之盛衰何如更觀其後天之飲食何如以此定其吉凶則修短之期可決矣然大段亦無過一年者此皆得之目睹非臆說也君火相火論近世之論心火謂之君火腎火謂之相火此說未安蓋心屬火而位居於上又純陽而為一身之主名曰君火無異議也若腎中之火則與心相遠乃水中之火也與心火不類名為相火似屬非宜蓋陰陽互藏其宅心固有火而腎中亦有火心火為火中之火腎火為水中之火腎火守於下心火守於上而三焦火之道路能引二火相交心火動而腎中之浮火亦隨之腎火動而心中之浮火亦隨之亦有心火為動而腎火不動其患獨在心亦有腎火動而心火不動其害獨在腎故治火之法必先審其何火而後用藥有定品治心火以苦寒治腎火以鹹寒若二臟之陰不足以配火則又宜取二臟之陰藥補之若腎火飛越又有回陽之法反宜用溫熱與治心火迥然不同故五臟皆有火而心腎二臟為易動故治法宜詳究也若夫相火之說則心胞之火參令人怔忡面赤煩躁眩暈此則在君火之旁名為相火似為確切試以內經參之自有真見也脈診脈決死生論生死於人大矣而能於兩手方寸之地微末之動即能決其生死何其近於誣也然古人往往百不失一者何哉其大要則以胃氣為本蓋人之所以生本乎飲食靈樞云谷於胃乃傳之肺五臟六腑皆以受氣寸口屬肺經為百脈之所會故其來也有生氣以行乎其間融和調暢得中土之精英此為有胃氣得者生失者死其大概也其次則推天運之順逆人氣與天氣相應如春氣屬木脈宜弦夏氣屬火脈宜洪之類反是則與天氣不應又其次則審臟氣之生克如脾病畏弦木剋土也肺病畏洪火剋金也反是則與臟氣無害又其次則辨病脈之從違病之與脈各有宜與不宜如脫血之後脈宜靜細而反洪大則氣亦外脫矣寒熱之證脈宜洪數而反細弱則真元將陷矣至於真臟之脈乃因胃氣已絕不營五臟所以何臟有病則何臟之脈獨現凡此皆內經難經等書言之明白詳盡學者苟潛心觀玩洞然易曉此其可決者也至云診脈即可以知何病又云人之死生無不能先知則又非也蓋脈之變遷無定或有卒中之邪未即通於經絡而脈一時未變者或病輕而不能現於脈者或有沉痼之疾久而與氣血相併一時難辨其輕重者或有依經傳變流動無常不可執一時之脈而定其是非者況病之名有萬而脈之象不過數十種且一病而數十種之脈無不可見何能診脈而即知其何病此皆推測偶中以此欺人也若夫真臟之脈臨死而終不現者則何以決之是必以望聞問三者合而參觀之亦百不失一矣故以脈為可憑而脈亦有時不足憑以脈為不可憑而又鑿鑿乎其可憑總在醫者熟通經學更深思自得則無所不驗矣若世俗無稽之說皆不足聽也症脈輕重論人之患病不外七情六淫其輕重死生之別醫者何由知之皆必問其症切其脈而後知之然症脈各有不同有現症極明而脈中不見者有脈中甚明而症中不見者其中有宜從症者有宜從脈者必有一定之故審之既真則病情不能逃否則不為症所誤必為脈所誤矣故宜從症者雖脈極順而症危亦斷其必死宜從脈者雖症極險而脈和亦決其必生如脫血之人形如死狀危在頃刻而六脈有根則不死此宜從脈不從症也如痰厥之人六脈或促或絕痰降則愈此宜從症不從脈也陰虛咳嗽飲食起居如常而六脈細數久則必死此宜從脈不宜從症也噎膈反胃脈如常人久則胃絕而脈驟變百無一生此又宜從症不從脈也如此之類甚多不可枚舉總之脈與症分觀之則吉凶兩不可憑合觀之則某症忌某脈某脈忌某症其吉凶乃可定矣又如肺病忌脈數肺屬金數為火火刑金也余可類推皆不外五行生剋之理今人不按其症而徒講乎脈則講之愈密失之愈遠若脈之全體則內經諸書詳言之矣脈症與病相反論症者病之發現者也病熱則症熱病寒則症寒此一定之理然症竟有與病相反者最易誤治此不可不知者也如冒寒之病反身熱而惡熱傷暑之病反身寒而惡寒本傷食也而反易飢能食本傷飲也而反大渴口乾此等之病尤當細考一或有誤而從症用藥即死生判矣此其中蓋有故焉或一時病勢未定如傷寒本當發熱其歸尚未發熱將來必至於發熱此先後之不同也或內外異情如外雖寒而內仍熱是也或有名無實如欲食好飲及至少進即止飲食之後又不易化是也或有別症相雜誤認此症為彼症是也或此人舊有他病新病方發舊病亦現是也至於脈之相反亦各不同或其人本體之脈與常人不同或輕病未現於脈或痰氣阻塞營氣不利脈象乖其所之或一時為邪所閉脈似危險氣通即復或其人本有他症仍其舊症之脈凡此之類非一端所能盡總宜潛心體認審其真實然後不為脈症所惑否則徒執一端之見用藥愈真而愈誤矣然苟非辨症極精脈理素明鮮有不惑者也病中風論今之患中風偏痹等病者百無一愈十死其九非其症俱不治皆醫者誤之也凡古聖定病之名必指其實各曰中風則其病屬風可知既為風病則主病之方必以治風為本故仲景侯氏黑散風引湯防己地黃湯及唐人大小續命等方皆多用風藥而因症增減蓋以風入經絡則內風與外風相煽以致痰火一時壅塞惟宜先驅其風繼清痰火而後調其氣血則經脈可以漸通今人一見中風等症即用人參熟地附子肉桂等純補溫熱之品將風火痰氣盡行補住輕者變重重者即死或有元氣未傷而感邪淺者亦必遷延時日以成偏枯永廢之人此非醫者誤之耶或云邪之所湊其氣必虛故補正即所以驅邪此大謬也惟其正虛而邪湊萬當急驅其邪以衛其正若更補其邪氣則正氣益不能支矣即使正氣全虛不能托邪於外亦宜於驅風藥中少加扶正之品以助驅邪之力從未有純用溫補者譬之盜賊入室定當先驅盜賊而後固其牆垣未有盜賊未去而先固其牆垣者或云補藥托邪猶之增家家人以御盜也最又不然蓋服純補這藥斷無專補正不補邪之理非若家人之專於御盜賊也是不但不驅盜並助盜矣況治病之法凡久病屬虛驟病屬實所謂虛者謂正虛也所謂實者謂邪實也中風乃急暴之症其為實邪無疑天下未有行動如常忽然大虛而昏僕者豈可不以實邪治之哉其中或有屬陰虛陽虛感熱感寒之別則於治風方中隨所現之症加減之漢唐諸法俱在可取而觀也故凡中風之類苟無中臟之絕症未有不可治者余友人患此症者遵余治法病一二十年而今尚無恙者甚多惟服熱補者無一存者矣臌膈論臌膈同為極大之病然臌可治而膈不可治蓋臌者有物積中其證屬實膈者不能納物其證屬虛實者可治虛者不可治此其常也臌之為病因腸胃衰弱不能運化或痰或血或氣或食凝結於中以致臌脝脹滿治之當先下其結聚然後補養其中氣則腸胃漸能克化矣內經有雞矢醴方即治法也後世治臌之方亦多見效以惟臟氣已絕臂細臍凸手心及背平滿青筋繞腹種種惡證齊現則不治若膈證乃肝火犯胃木來侮土謂之賊邪胃脘枯槁不復用事惟留一線細竅又為痰涎瘀血閉塞飲食不能下達即勉強納食仍復吐出蓋人生全在飲食經云谷入於胃以傳於肺五臟六腑皆以受氣今食既不入則五臟六腑皆竭矣所以得此症者能少納穀則不出一年而死全不納穀則不出半年而死凡春得病者死於秋秋得病者死於春蓋金木相剋之時也又有卒然嘔吐或嘔吐而時目時發又或年當少壯是名反胃非膈也此亦可治至於類臌之症如浮腫水腫之類或宜針灸或宜泄瀉病象各殊治亦萬變醫者亦宜廣求諸法而隨宜施用也寒熱虛實真假論病之大端不外乎寒熱虛實然必辨其真假而後治之無誤假寒者寒在外而熱在內也雖大寒而惡熱飲假熱者熱在外而寒在內也雖大熱而惡寒飲此其大較也假實者形實而神衰其脈浮洪芤散也假虛者形衰而神全其脈靜小堅實其中又有人之虛實證之虛實如怯弱之人而傷寒傷食此人虛而證實也強壯之人而失血勞倦此人實而證虛也或宜正治或宜從治或宜分治或宜合治或宜從本或宜從標寒因熱用熱因塞用上下異方煎丸異法補中兼攻攻中兼補精思妙術隨變生機病勢千端立法萬變則真假不能惑我之心亦不能窮我之術是在博求古法而神明之稍執己見或學力不至其不為病所惑者幾希矣內傷外感論七情所病謂之內傷六淫所侵謂之外感自內經難經以及唐宋諸書無不言之深切著明矣二者之病有病形同而病因異者亦有病因同而病形異者又有全乎外感全乎內傷者理會有內傷兼外感外感兼內傷者則因與病又互相出入參錯雜亂治法迥殊蓋內傷由於神志外感起於經絡輕重淺深先後緩急或分或合一或有誤為害非輕能熟於內經及仲景諸書細心體認則雖其病萬殊其中條理井然毫無疑似出入變化無有不效否則彷徨疑慮雜藥亂投全無法紀屢試不驗更無把握不咎己之審病不明反咎藥之治病不應如此死者醫殺之耳病情傳變論病有一定之傳變有無定之傳變一定之傳變如傷寒太陽傳陽明及金匱見肝之病知肝傳脾之類又如痞病變臌血虛變浮腫之類醫者可預知而防之也無定之傳變或其人本體先有受傷之處或天時不知又感時行之氣或調理失宜更生他病則無病不可變醫者不能預知而為防者也總之人有一病皆當加意謹慎否則病後增病則正虛而感益重輕病亦變危矣至於既傳之後則標本緩急先後分合用藥必兩處兼顧而又不雜不亂則諸病亦可漸次乎復否則新病日增無所底止矣至於藥誤之傳變又復多端或過於寒涼而成寒中之病或過服溫燥而成熱中之病或過於攻伐而元氣大虛或過於滋潤而脾氣不實不可勝舉近日害人最深者大病之後邪未全退又不察病氣所傷何處即用附子肉桂熟地麥冬人參白朮五味萸肉之類將邪火盡行補澀始若相安久之氣逆痰升脹滿昏沉如中風之狀邪氣與元氣相併諸藥無效而死醫家病家猶以為病後大虛所致而不知乃邪氣固結而然也余見甚多不可不深戒病同人異論天下有同此一病而治此則效治彼則不效且不惟無效而反有大害者何也則以病同而人異也夫七情六淫不感不殊而受感之人各殊或氣體有強弱質性有陰陽生長有南北性情有剛柔筋骨有堅脆肢體有勞逸年力有老少奉養有膏粱藜藿之殊心境有憂勞和樂之別更加天時有寒暖之不同受病有深淺之各異一概施治則病情雖中而於人之氣體迥乎相反則利害亦相反矣故醫者心細審其人之種種不同而後輕重緩急大小先後之法因之而定內經言之極詳即針灸及外科之治法盡然故凡病者皆當如是審察也病症不同論凡病之總者謂之病而一病必有數症如太陽傷風是病也其惡風身熱自汗頭痛是症也合之而成其為太陽病此乃太陽病之本症也若太陽病而又兼泄瀉不寐心煩痞悶則又為太陽病之兼症矣如瘧病也往來寒熱嘔吐畏風口苦是症也合之而成為瘧此乃瘧之本症也若瘧而兼頭痛脹滿嗽逆便閉則又為瘧疾之兼症矣若瘧而又下痢數十行則又不得謂之兼症謂之兼病蓋瘧為一病痢又為一病而二病中有本症各有兼症不可勝舉以此類推則病之與症其分並何啻千萬不可不求其端而分其緒也而治之法或當合治或當分治或當先治或當後治或當專治或當不治尤在視其輕重緩急而次第奏功一或倒行逆施雜亂無紀則病變百出雖良工不能挽回矣病同因別論凡人之所苦謂之病所以致此病者謂之因如同一身熱也有風有寒有痰有食有陰虛火升有鬱怒憂思勞怯蟲病此謂之因知其因則不得專以寒涼治熱病矣蓋熱同而所以致熱者不同則藥亦迥異凡病之因不同而治各別者盡然則一病而治法多端矣而病又非止一症必有兼症焉如身熱而腹痛則腹又為一症而腹痛之因又復不同有與身熱相合者有與身熱各別者如感寒而身熱其腹亦因寒而痛此相合者也如身熱為寒其腹痛又為傷食則各別者也又必審其食為何食則以何藥消之其立方之法必切中二者之病源而後定方則一藥而兩病俱安矣若不問其本病之所因及兼病之何因而徒曰某病以某方治之其偶中者則投之或愈再以治他人則不但不愈而反增病必自疑曰何以治彼效而治此不效並前此之何以愈亦不知之則幸中者甚少而誤治者甚多終身治病而終身不悟歷症愈多而愈惑矣亡陰亡陽論經云奪血者無汗奪汗者血血屬陰是汗多乃亡陰也故止汗之法必用涼心斂肺之藥何也心主血汗為心之液故當清心火汗必從皮毛出肺主皮毛故又當斂肺氣此正治也惟汗出太甚則陰氣上竭而腎中龍雷之火隨水而上若以寒涼折之其火愈熾惟用大劑參附佐以咸降之品如童便牡蠣之類冷飲一碗直達下焦引其真陽下降則龍雷之火反乎其位而汗隨止此與亡陰之汗真大相懸絕故亡陰亡陽其治法截然而轉機在頃刻當陽氣之未動也以陰藥止汗乃陽氣之既動也以陽藥止汗而龍骨牡蠣黃耆五味收澀之藥則兩方皆可隨宜用之醫者能於亡陰亡陽之交分其界限則用藥無誤矣其亡陰亡陽之辨法如何亡陰之汗身畏熱手足溫肌熱汗亦熱而味鹹口渴喜涼飲氣粗脈洪實此其驗也亡陽之汗身反惡寒手足冷肌涼汗冷而味淡微黏口不渴而喜熱飲氣微脈浮數而空此其驗也至於尋常之正汗熱汗邪汗自汗又不在二者之列此理知者絕少即此汗之一端而聚訟紛紛毫無定見誤治甚多也病有不愈不死雖愈必死論能愈病之非難知病之必愈必不愈為難夫人之得病非皆死症也庸醫治之非必皆與病相反也外感內傷皆有現病約略治之自能向愈況病情輕者雖不服藥亦能漸痊即病勢危迫醫者苟無大誤邪氣漸退亦自能向安故愈病非醫者之能事也惟不論輕重之疾一見即能決其死生難易百無一失此則學問之極功而非淺嘗者所能知也夫病輕而預知其愈病重而預知其死此猶為易知者惟病象甚輕而能決其必死病勢甚重而能斷其必生乃為難耳更有病已愈而不久必死者蓋邪氣雖去而其人之元氣與病俱亡一時雖若粗安真氣不可復續如兩虎相角其一雖勝而力已脫盡雖良工亦能救也又有病不愈而人亦不死者蓋邪氣盛而元氣堅固邪氣與元氣相併大攻則恐傷其正小攻則病不為動如油入面一合則不可復分而又不至於傷生此二者皆人這所不知都民其大端則病氣入臟腑者病與人俱盡者為多病在經絡骨脈者病與人俱存者為多此乃內外輕重之別也斯二者方其病之始形必有可徵之端良工知之自自有防微之法既不使之與病俱亡亦不使之終身愈此非深通經義之人必不能窮源極流挽回於人所不見之地也卒死論天下卒死之人甚多其故不一內中可救者十之七八不可救者僅十之二三惟一時不得良醫故皆枉死耳夫人內外無病飲食行動如常而忽然死者其臟腑經絡本無受病之處卒然感犯外邪如惡風穢氣鬼邪毒厲等物閉寒氣道一時不能轉動則大氣阻絕昏悶迷惑久而不通則氣愈聚愈塞如繫繩於頸氣絕則死矣若醫者能知其所犯何故以法治之通其氣驅其邪則立愈矣又有痰涎壅塞阻遏氣道而卒死者通氣降痰則蘇所謂痰厥之類是也以前諸項良醫皆能治之惟臟絕之症則不治其人或勞心思慮或酒不節或房欲過度或惱怒不常五臟之內精竭神衰惟一線真元未斷行動如常偶有感觸其元氣一時斷絕氣脫神離頃刻而死既不可救又不及救此則卒死之最急而不可治者也至於暴遇神鬼適逢冤譴此又怪異之事不在疾病之類矣病有鬼神論人之受邪也必有受之之處有以召之則應者斯至矣夫人精神完固則外邪不敢犯惟其所以御之之具有虧則侮之者斯集凡疾病有為鬼神所憑者其愚魯者以為鬼神實能禍人其明理者以為病情如此必無鬼神二者皆非也夫鬼神猶風寒暑濕之邪耳衛氣虛則受寒榮氣虛則受熱神氣虛則受鬼蓋人之神屬陽陽衰則鬼憑之內經有五臟之病則現五色之鬼難經云脫陽者見鬼故經穴中有鬼床鬼室等穴此諸穴者皆賴神氣以充塞之若神氣有虧則鬼神得而憑之猶之風寒之能傷人也故治寒者壯其陽治熱者養其陰治鬼者充其神而已其或有因痰因思因驚者則當求其本而治之故明理之士必事事窮其故乃能無所惑而有據否則執一端之見而昧事理之實均屬憒憒矣其外更有觸犯鬼神之病則祈禱可愈至於冤譴之鬼則有數端有自作之孽深仇不可解者有祖宗貽累者有過誤害人者其事皆鑿鑿可徵似儒者所不道然見於經史如公子彭生伯有之類甚多目睹者亦不少此則非藥石祈禱所能免矣腎虛非陰症論今之醫者以其人房勞之後或遺精之後感冒風寒而發熱者謂之陰症病者遇此亦自謂之陰症不顧其現症何如總用參朮附桂乾薑地黃等溫熱峻補之藥此可稱絕倒者也夫所謂陰症者寒邪中於三陰經也房後感風豈風寒必中腎經即使中之亦不過散少陰之風寒如傷寒論中少陰發熱仍用麻黃細辛發表而已豈有用辛熱溫補之法耶若用溫補則補其風寒於腎中矣況陰虛之人而感風寒亦必由太陽入仍屬陽邪其熱必甚兼以燥悶煩渴尤宜清熱散邪豈可反用熱藥若果直中三陰則斷無壯熱之理必有惡寒倦臥厥冷喜熱等症方可用溫散然亦終無用滋補之法即如傷寒瘥後房事不慎又發寒熱謂之女勞復此乃久虛之人復患大症依今人之見尤宜峻補者也而古人治之用竹皮一升煎湯服然則無病而房後感風更不宜用熱補矣故凡治病之法總視目前之現證現脈如果六脈沉遲表裡綿畏寒的系三陰之寒證即使其本領強壯又絕欲十年亦從陰治若系所現脈證的系陽邪發熱煩渴並無三陰之症即使其人本體虛弱又復房勞過度亦從陽治如傷寒論中陽明大熱之證宜用葛根白虎等方者瞬息之間轉入三陰即改用溫補若陽症轉陽症亦即用涼散此一定之法也近世惟喻嘉言先生能知此義有寓意草中黃長人之傷寒案可見餘人皆不知之其殺人可勝道哉吐血不死咳嗽必死論今之醫者謂吐血為虛勞之病此大謬也夫吐血有數種大概咳者成勞不咳者不成勞間有吐時偶咳者當其吐血之時狼狽頗甚吐血即痊皆不成勞何也其吐血一止則周身無病飲食如故而精神生矣即使亡血之後或陰虛內熱或筋骨疼痛綿可服藥而痊若咳嗽則血止而病仍在日嗽夜嗽痰壅氣升多則三年少則一年而死知蓋咳嗽不止則腎中之元氣震盪不寧肺為腎之母母病則子亦病故也又肺為五臟之華蓋皆云穀氣之胃以傳於肺五臟六腑皆以受氣其清者為營濁者為衛是則臟腑皆取精於肺肺病則不能輸精於臟腑一年而臟腑皆枯三年而臟腑竭矣故咳嗽為真勞不治之疾也然亦有咳嗽而不死者其嗽亦有時稍緩其飲食起居不甚變又其人善於調攝延至三年之後起居如舊間或一發靜養即愈此乃百中難得一者也更有不咳之人血證屢發肝竭肺傷亦變咳嗽久而亦死此則不善調攝以輕變重也執此以決血證之死生百不一失矣胎產論婦科之最重者二端墮胎與難產耳世之治墮胎者往往純用滋補治難產者往往專於攻下二者皆非也蓋半產之故非一端由於虛滑者十之一二由於內熱者十之八九蓋胎惟賴血以養故得胎之後經事不行者因衝任之血皆為胎所吸無餘血下行也苟血或不足則胎枯竭而下墮矣其血所以不足之故皆由內熱火盛陽旺而陰虧也故古人養胎之方專以黃芩為主又血之生必由於脾胃經云營衛之首納欲為寶故又以白朮佐之乃世之人專以參耆補氣熟地滯胃氣旺則火盛胃濕則不運生化之源衰而血益少矣至於產育之事乃天地化育之常本無危險之理險者千不得一世之遭厄難者乃人事之未工也其法有乎產婦不可令早用力蓋胎必轉而後下早用力而胎先下墜斷難舒轉於是橫生倒產之害生又用力則胞漿驟下胎已枯澀何由能產此病不但產子之家不知即收生穩婦亦有不知者至於用藥之法則交骨不開胎元不轉種種諸症各有專方其外或宜潤或宜降或宜溫或宜涼亦當隨症施治其大端以養血為主蓋血足則諸症自退也至於易產強健之產婦最多卒死蓋大脫血之後衝任空虛經脈嬌脆健婦不以為意輕舉妄動用力稍重衝脈斷裂氣冒血崩死在頃刻尤忌舉手上頭如是死者吾見極多不知者以為奇異實理之常生產之家不可不知也病有不必服藥論天下之病竟有不宜服藥者如黃疸之類是也黃疸之症仲景原有煎方然輕者用之俱效而重者俱不效何也蓋疸之重者其肋中有囊以裹黃水其囊並無出路藥只在囊外不入囊中所服之藥非補邪即傷正故反有害若輕病則囊尚未成服藥有效至囊成之後則百無一效必須用輕透之方或破其囊或消其水另有秘方傳授非泛然煎丸之所能治也痰飲之病亦有囊常藥亦不能愈外此如吐血久痞等疾得藥之益者甚少受藥誤者甚多如無至穩必效之方不過以身試藥則寧以不服藥為中醫矣方藥方藥離合論方之與藥似合而實離也得天地之氣成一物之性各有功能可以變易血氣以除疾病此藥之力也然草木之性與人殊體入人腸胃何以能如人之所欲以致其效聖人為之制方以調劑之或用以專攻或用以兼治或相輔者或相反者或相用者或相制者故方之既成能使藥各全其性亦能使藥各失其性操縱之法有大權焉此方之妙也若夫按病用藥藥雖切中而立方無法謂之有藥無方或守一方以治病方雖良善而其藥有一二味與病不相關者謂之有方無藥譬之作書之法用筆已工而配合顛倒與夫字形俱備而點畫不成者皆不得謂之能書故善醫者分觀之而無藥弗切於病情合觀之而無方不本於古法然後用而弗效則病之故也非醫之罪也而不然者即偶或取效隱害必多則亦同於殺人而已矣至於方之大小奇偶之法則內經詳言之茲不復贅云古方加減論古人制方之義微妙精詳不可思議蓋其審察病情辨別經絡參考藥性斟酌輕重其於所治之病不爽毫髮故不必有奇品異術而沉痼艱險之疾投之輒有神效此漢以前之方也但生民之疾病不可勝窮若必每病制一方是曷有盡期乎故古人即有加減之法其病大端相同而所現之症或不同則不必更立一方即於是方之內因其現症之異而為之加減如傷寒論中治太陽病用桂枝湯若見項背強者則用桂枝加葛根湯喘者則用桂枝加厚朴杏子湯下後脈促胞滿者桂枝去白芍湯更惡寒者去白芍加附子湯此猶以藥為加減者也若桂枝麻黃各半湯則以兩方為加減矣若發奔豚者用桂枝為加桂枝湯則又以藥之輕重為加減矣然一二味加減雖不易本方之名而必明著其加減之藥若桂枝湯倍用芍藥而加飴糖則又不名桂枝加飴糖湯而為建中湯其藥雖同而義已別則立名亦異古法之嚴如此後之醫者不識此義而又欲託名用古取古方中一二味則即以某方目之如用柴胡則即曰小柴胡湯不知小柴胡之力全在人參也用豬苓澤瀉即曰五苓散不知五苓之妙專在桂枝也去其要藥雜以他藥而仍以其方目之用而不效不知自咎或則歸咎於病或則曰咎於藥以為古方不可治今病嗟呼即使果識其病而用古方支離零亂豈有效乎遂相戒以為古方難用不知全失古方精義故與病毫無益而反有害也然則當何如曰能識病情與古方合者則全用之有別症則據古法加減之如不盡合則依古方之法將古方所用之藥而去取損益之必使無一藥之不對症自然不倍於古人之法而所投必有神效矣方劑古今論後世之方已不知幾億萬矣此皆不足以各方者也昔者聖人之制方也推藥理之本原識藥性之專能察氣味之從逆審臟腑之好惡合君臣之配偶而又探索病源推求經絡其思遠其義精味不過三四而其用變化不窮聖人這智真與天地同體非人之心思所能及也上古至今千聖相傳無敢失墜至張仲景先生復申明用法設為問難註明主治之症其傷寒論金匱要略集千聖之大成以承先而啟後萬世不能出其範圍此之謂古方與內經並垂不朽者其前後名家如倉公扁鵲華佗孫思邈諸人各有師承而淵源又與仲景微別然猶自成一家但不能與靈素本草一線相傳為宗枝正脈耳既而積習相仍每著一書必自撰方千百唐時諸公用藥雖博已乏化機至於宋人並不知藥其方亦板實膚淺元時號稱極盛各立門庭徒騁私見迨乎有明蹈襲元人緒餘而已今之醫者動云古方不知古方之稱其指不一若謂上古之方則自仲景先生流傳以外無幾也如謂宋元所制之方則其可法可傳者絕少不合法而荒謬者甚多豈可奉為典章若謂自明人以前皆稱古方則其方不下數百萬夫常用之藥不過數百品而為方數百萬隨拈幾味皆已成方何必定云某方也嗟嗟古之方何其嚴今之方何其易其間亦有奇巧之法用藥之妙未必不能補古人之所未及可備參考者然其大經大法則萬不能及其中更有違經背法之方反足貽害安得有學之士為之擇而存之集其大成刪其無當實千古之盛舉余蓋有志而未遑矣單方論單方者藥不過一二味治不過一二症而其效則甚捷用而不中亦能害人即世所謂漲上方者是也其原起於本草蓋古之聖人辨藥物之性則必著其功用如逐風逐寒解毒定痛之類凡人所患之症上一二端則以一藥治之藥專則力厚自有奇效若病兼數症則必合數藥而成方至後世藥品日增單方日多有效有不效矣若夫外內之感其中自有傳變之道虛實之殊久暫之別深淺之分及夫人性各殊天時各異此非守經達權者不能治若皆以單方治之則藥性專而無制偏而不醇有利必有害故醫者不可以此嘗試此經方之所以為貴也然參考以廣識見且為急救之備或為專攻之法是亦不可不知者也禁方論天地有好生之德聖人有大公之心立方以治病使天下共知這豈非天地聖人之至願哉然而方之有禁則何也其故有二二則懼天下之輕視夫道也夫經方之治病視其人學問之高下以為效驗故或用之而愈或用之而反害變化無定此大公之法也若禁方者義有所不解機有所莫測其傳也往往出於奇人隱士仙佛鬼神其遇之也甚難則愛護之必至若輕以授人必生輕易之心所以方家往往愛惜此乃人之情也一則恐發天地之機也禁方之藥其製法必奇其配合必巧窮陰陽之柄窺造化之機其修合必虔誠敬慎少犯禁忌則藥無驗若輕以示人則氣泄而有不神此又陰陽之理也靈樞禁服篇黃帝謂雷公曰此先師這所禁割臂歃血之盟也故黃帝有蘭臺之藏長桑君有無泄之戒古聖皆然若夫詭詐之人專欲圖利託名禁方欺世惑眾更有修煉熱藥長欲導淫名為養生實速其死此乃江湖惡習聖人之所以誅也又有古之禁方傳之已廣載入醫書中與經方並垂有識者自能擇之也古今方劑大小論今人以古人氣體充實故方劑分兩甚重此無稽之說也自三代至漢晉升斗權衡雖有異同以今較之不過十分之二余親見漢時有六升銅量容今之一升二合如桂枝湯傷寒大大劑也桂枝芍藥各三兩甘草二兩共八兩為一劑在今只一兩六錢又分三服則一服不過五錢三仞零他方有藥品多者亦不過倍之而已況古時之藥醫者自備俱用鮮者分兩以鮮者為準干則折算如半夏麥冬之類皆生大而干小至附子則野生者甚小後人種之乃肥大皆有確證今人每方必十餘味每味三四錢則一劑重一三兩矣更有熟地用至四兩一劑者尤屬可怪古丸藥如烏梅丸每服如桐子大十丸今秤不過二三分今則用三四錢至七八錢矣古末藥用方寸經匕不過今之六七分今服三四錢矣古人用藥分兩未嘗從重周禮遺人凡萬民之食食者人四鬴六斗四升曰鬴四鬴共二石五斗六升為人一月之食則每日食八升有餘矣蓋一升只二合也二十年來時醫誤閱古方增重分兩此風日熾即使對病無氣不勝藥力亦必有害況更與病相反害不尤速乎既不考古又無師授無怪乎其動成笑柄也藥誤不即死論古人治法無一方不對病無一藥不對病如是而病猶不愈此乃病本不可愈非醫之咎也後世醫失其傳病之名亦不能知宜其胸中毫無所主也凡一病有一病之名如中風總名也其類有偏枯痿痹風痱歷節之殊而諸症之中又各有數症各有定名各有主方又如水腫總名也其類有皮水正水石水風水之殊而諸症又各有數症各有定名各有主方凡病盡然醫者必能實指其何名遵古人所主何方加減何藥自有法度可循乃不論何病總以陰虛陽虛等籠之談概之而試以籠統不切之藥然亦竟有愈者或其病本輕適欲自愈或偶有一二對症之藥亦奏小效皆屬誤治其得免於殺人之名者何也蓋殺人之藥必大毒如砒鳩之類或大熱大寒峻厲之品又適與病相反服後立見其危若尋常之品不過不能愈病或反增他病耳不即死也久而病氣自退正氣自復無不愈者間有遷延日久或隱受其害而死更或屢換庸醫遍試諸藥久而病氣益深元氣竭亦死又有初因誤治變成他病展轉而死又有始服有小效久服太過反增他病而死蓋日日診視小效則以為可愈小劇又以為難治並無誤治之形確有誤治之實病家以為病久不痊自然不起非醫之咎因其不即死而不之罪其實則真殺之而不覺也若夫誤投峻厲相反之藥服後顯然為害此其殺人人人能知之矣惟誤服參附峻厲之藥而即死者則病家之所甘心必不歸咎於醫故醫者雖自知其誤必不以此為戒而易其術也藥石性同用異論一藥有一藥之性情功效其藥能治某病古方中用之以治某病此顯而易見者然一藥不止一方用之他方用之亦效何也蓋藥之功用不止一端在北方則取其此長在彼方則取其彼長真知其功效之實自能曲中病情而得其力迨至後世一藥所治之病愈多而亦效者蓋古人尚未盡知之後人屢試而後知所以歷代本草所注藥性較之神農本經所注功用增益數倍蓋以此也但其中有當有不當不若神農本草字字精切耳又同一熱藥而附子之熱與乾薑之熱迥乎不同同一寒藥而石膏之寒與黃連之寒迥乎不同一或誤用禍害立至蓋古人用藥之法並不專取其寒熱溫涼補瀉之性也或取其氣或取其味或取其色或取其形或取其所生之方或取嗜好之偏其藥似與病情之寒熱溫涼補瀉若不相關而投之反有神效古方中如此者不可枚舉學者必將神農本草字字求其精義之所在而參以仲景諸方則聖人之精理自能洞曉而已之立方亦必有奇思妙想深入病機而天下無難治之症也劫劑論世有奸醫利人之財取效於一時不顧人之生死者謂之劫劑劫劑者以重藥奪截邪氣也夫邪之中人不能使之一時即出必漸消漸托而後盡焉今欲一日見效勢必用貓厴之藥與邪相爭或用峻補之藥遏抑邪氣藥猛厲則邪氣暫伏而正亦傷藥峻補則正氣驟發而邪內陷一時似乎有效及至藥力盡而邪復來元氣已大壞矣如病者身熱甚不散其熱而以沉寒之藥遏之腹痛甚不求其因而以香燥御之瀉痢甚不去其積而以收斂之藥塞之之類此峻厲之法也若邪盛而投以大劑參附一時陽氣大旺病氣必潛藏自然神氣略定越一二日元氣與邪氣相併反助邪而肆其毒為禍尤烈此峻補之法也此等害人之術奸醫以此欺人而騙財者十之五庸醫不知而效尤以害人者亦十之五為醫者可不自省病家亦不可不察也製藥論製藥之法古方甚少而最詳於宋之雷斅今世所傳雷公炮炙論是也後世製藥之法日我一日內中亦有至無理者固不可從若其微妙之處實有精義存焉凡物氣厚力大者無有不偏偏則有利必有害欲取其利而去其害則用法以制之則藥性之偏者醇矣其制之義又各不同或以相反為制或以相資為制或以相惡為制或以相畏為制或以相喜為制而製法又復不同或制其形或制其性或制其味或制其質此皆巧於用藥之法也古方製藥無多其立方之法配合氣性如桂枝湯中用白芍亦即有相制之理故不必每藥制之也若後世好奇眩異之人必求貴重怪僻之物其製法大費工本以神其說此乃好奇尚異之人造作以欺誑富貴人之法不足憑也惟平和而有理者為可從耳人參論天下之害人者殺其身未必破其家破其家未必殺其身先破人之家而後殺其身者人參也夫人參用之而當實能補養元氣拯救危險然不可謂天下之死人皆能生之也其為物氣盛而力厚不論風寒暑濕痰火鬱結皆能補塞故病人如果邪去正衰用之固宜或邪微而正亦憊或邪深而正氣怯弱不能逐之於外則於除邪藥中投之以為驅邪之助然又必審其輕重而後用之自然有扶危定傾之功乃不察其有邪無邪是虛是實又佐以純補溫熱之品將邪氣盡行補住輕者邪氣永不復出重者即死矣夫醫者之所以遇疾即用而病家服之死而無悔者何也蓋愚人之心皆以價貴為良藥價賤為劣藥而常人之情無不好補而惡攻故服參而死即使明知其誤然以為服人參而死則醫者之力已竭而人子之心已盡此命數使然可以無恨矣若服攻削之藥而死即使用藥不誤病實難治而醫者之罪已不可勝誅矣故人參者乃醫家邀功避罪之聖藥也病家如此醫家如此而害人無窮矣更有駭者或以用人參為冠冕或以用人參為有力量又因其貴重深信以為必能挽回造化故毅然用之孰知人參一用凡平凡這有邪者即死其不死者亦終身不得愈乎其破家之故何也蓋向日之人參不過一二換多者三四換今則其價十倍其所服又非一錢二錢而止小康之家服二三兩而家已蕩然矣夫人情於死生之際何求不得寧恤破家乎醫者全不一念輕將人參立方用而不遵在父為不慈在子為不孝在夫婦昆弟為忍心害理並有親戚朋友責罰痛罵即使明知無益姑以此塞責又有孝之慈父幸甚或生竭力以謀之遂使貧窶之家病或稍愈一家終身凍餒若仍不救棺殮俱無賣妻鬻子全家覆敗醫者誤治殺人可恕而逞己之意日日害人破家其惡甚於盜賊可不慎哉吾願天下之人斷不可以人參為起死回生之藥而必服之醫者必審其病實系純虛非參不治服必萬全然後用之又必量其家業尚可以支持不至用參之後死生無靠然後節省用之一以惜物力一以全人之命一以保人之家如此存心自然天降之福若如近日之醫殺命破家於人不知之地恐天之降禍亦在人不知之地也可不慎哉用藥如用兵論聖人之所以全民生也五穀為養五果為助五畜為益五菜為充而毒藥則以之攻邪故雖甘草人參誤用致害皆毒藥之類也古人好服食者必生奇疾猶之好戰勝者必有奇殃是故兵之設也以除暴不得已而後興藥之設也以攻疾亦不得已而後用其道同也故病之為患也小則耗精大能傷命隱然一敵國也以草木偏性攻臟腑之偏勝必能知彼知己多方以制之而後天喪身殞命之憂是故傳經之邪而先奪其未至則所以斷敵之要道也橫暴之疾而急保其未病則所以守我之岩疆也挾宿食而病者先除其食則敵之資糧已焚合舊疾而發者必防其並則敵之內應既絕辨經絡而無泛用之藥此之謂嚮導之師因寒熱而有反用之方此之謂行間之術一病而分治之則用寡可以勝眾使前後不相救而勢自衰數病而合治之則併力搗其中堅使離散無所統而眾悉潰病方進則不治其太甚固守元氣所以老其師病方衰則必究其所之更益精銳所以搗其穴若夫虛邪之體攻河過本和平之藥而以峻藥補之衰敝之日不可窮民力也實邪之傷攻不可緩用峻厲之藥而以常藥和之富強之國可以振威武也然而選材必當器械必良剋期不衍布陣有方此又不可更僕數也孫武子十三篇治病之法盡之矣執方治病論古人用藥立方先陳列病症然後云某方主之若其症少用出入則有加減之法附於後方可知方中之藥必與所現之症纖悉皆合無一味虛設乃用此方毫無通融也又有一病而云某方亦主之者其方或稍有異同或竟不同可知一病並不止一方所能治今乃病名稍似而其中之現症全然不同乃立以此方施治則其藥皆不對症矣並有病名雖一病形相反亦用此方則其中盡屬相反之藥矣總之欲用古方必先審病者所患之症悉與古方前所陳列之症皆合更檢方中所用之藥無一不與所現之症相合然後施用否則必須加減無可加減則另擇一方斷不可道聽途說聞某方可以治某病不論其因之異同症之出入而冒昧施治雖所用悉本於古方而害益大矣湯藥不足盡病論內經治病之法針灸為本而佐之以砭石熨浴導引按摩酒醴等法病各有宜缺一不可蓋服藥之功入腸胃而氣四達未嘗不能行於臟腑經絡若邪在筋骨肌肉之中則病屬有形藥之氣味不能奏功也故必用針灸等法即從病之所在調其血氣逐其風寒為實而可據也況即以服藥論止用湯劑亦不能盡病蓋湯者蕩也其行速其質輕其力易過而不留惟病在榮衛腸胃者其效更速其餘諸病有宜丸宜散宜膏者必醫者預備以待一時急用視其病之所在而委曲施治則病無遁形故天下無難治之症而所投輒有神效扁鵲倉公所謂禁方者是也若今之醫者只以一煎方為治惟病後調理則用滋補丸散盡廢聖人之良法即使用藥不誤而與病不相入則終難取效故扁鵲云人之所患患病多醫之所患患道少近日病變愈多而醫家之道愈少此痼疾之所以日多也本草古今論本草之始昉於神農藥止三百六十品此乃開天之聖人與天地為一體實能探造化之精窮萬物之理字字精確非若後人推測而知之者故對症施治其應若響仲景諸方之藥悉本此書藥品不多而神明變化已無病不治矣迨其後藥味日多至隱弘景倍之而為七百二十品後世日增一日凡華夷之奇草逸品試而有效醫家皆取而用之肛有成書至明李時珍增皆取而用之代有成書至明李時珍增益唐慎微證類本草為綱目考其異同辨其真偽原其生產集諸家之說而本草更大備此藥味由少而多之故也至其功用則亦後人試驗而知之故其所治之病益廣然皆不若神農本草之純正真確故宋人有云用神農之品無不效而弘景所增已不甚效若後世所增之藥則萬有不足憑者至其詮釋大半皆視古方用此藥醫某病則增注之或古方治某病其藥不止一品而誤以方中此藥為專治此病者有之更有己意推測而知者又或偶愈一病實非此藥之功而強著其效者種種難信至張潔古李東垣輩以某藥專派入某經則更穿鑿矣共詳在治病不必分經絡臟腑篇故論本草必以神農為本而他說則必審擇而從之更必驗之於病而後信又必考古方中所曾用者用可採取余則只可於單方外治之法用之又有後世所謂之奇藥或出於深山窮谷或出於殊方異域前世所未嘗有者後人用之往往有奇效此乃偏方異氣之所鍾造物之機久而愈泄能治古方所不能治之奇病博物君子亦宜識之以廣見聞此又在本草之外者矣藥性變遷論古方所用之藥當時效驗顯著而本草載其功用鑿鑿者今依方施用竟有應與不應其故何哉蓋有數端焉一則地氣之殊也當時初用之始必有所產之地此乃其本生之土故氣厚而力全以後傳種他方則地氣移而力薄矣一則種類之異也凡物之種類不一古人所採必至貴之種後世相傳必擇其易於繁衍者而種之未必皆種之至貴者物雖非偽而種則殊矣一則天生與人力之異也當時所採皆生於山谷之中元氣未泄故得氣獨厚今皆人功種植既非山谷之真氣又加灌溉之功則性平淡而薄劣矣一則名實之訛也當時藥不市賣皆醫者自取而備之迨其後有不常用之品後人欲得而用之尋求採訪或誤以他物充之或以別種代之又肆中未備以近似者欺人取利此藥遂失其真矣其變遷之因實非一端藥性既殊即審病極真處方極當奈其藥非當時之藥即效亦不可必矣今之醫者惟知定方其藥則惟病家取之肆中所以真假莫辨雖有神醫不能以假藥治真病也藥性專長論藥之治病有可解者有不可解者如性熱能治寒性燥能治濕芳香則通氣滋潤則生津此可解者也如同一發散也而桂枝則散太陽之邪柴胡則散少陽之邪同一滋陰也而麥冬則滋肺之陰生地則滋腎之陰同一解毒也而雄黃則解蛇蟲之毒甘草則解飲食之毒已有不可盡解者至如鱉甲之消痞塊使君子之殺蛔蟲赤小豆之消膚腫蕤仁生服不眠熟服多眠白鶴花之不腐肉而腐骨則萬不可解者此乃藥性之專長即所謂單方秘方也然人只知不可解者之為專長而不知常用藥之中亦各有專長之功後人或不知之而不能用或日用而忽焉皆不能盡收藥之功效者也知醫者當廣集奇方深明藥理然後奇症當前皆有治法變化不窮當年神農著本草之時既不能睹形而即識其性又不可每藥歷試而知竟能深識其功能而所投必效豈非與造化相為默契而非後人思慮之所能及者乎煎藥法論煎藥之法最宜深講藥之效不效全在乎此夫烹飪禽魚羊豕失其調度尚能損人況藥專以之治病而可不講乎其法載於古方之末者種種各殊如麻黃湯先煎麻黃去沫然後加余藥同煎此主藥當先煎之法也而桂枝湯又不必先煎桂枝服藥後須啜熱粥以助藥力又一法也如茯苓桂枝甘草大棗湯則以甘瀾水先煎茯苓如五苓散則以白飲和服服後又當多飲暖水小建中湯則先煎五味去渣而後納飴糖大柴胡湯則先煎五味去渣而後納飴糖大柴胡湯則煎減半去渣再煎柴胡加龍骨牡蠣湯則煎藥成而後納大黃其煎之多寡或煎水減半或十分煎去二三分或止煎一二十沸煎藥之法不可勝者皆各有意義大者發散之藥及芳香之藥不宜多煎取其生而疏蕩補益滋膩之藥宜多煎取其熟而停蓄此其總訣也故方藥雖中病而煎法失度其藥必無效蓋病家之常服藥者或尚能依法為之其粗魯貧苦之家安能如法制度所以病難愈也若今之醫者亦不能知之矣況病家乎服藥法論病之愈不愈不但方必中病方雖中病而服之不得其法則非特無功而反有害此不可不知也如發散之劑欲驅風寒出之於外必熱服而暖覆其體令藥氣行於榮衛熱氣周遍挾風寒而從汗解若半溫而飲之仍當風坐立或公寂然安臥則藥留腸胃不能得汗風寒無暗消之理而榮氣反為風藥所傷矣能利之藥欲其化積滯而達之於下也必空腹頓服使藥性鼓動推其垢濁從大便解若與飲食雜投則新舊混雜而藥氣與食物相亂則氣性不專而食積愈頑矣故傷寒論等書服藥之法宜熱宜溫宜涼宜冷宜緩宜急宜多宜少宜早宜晚宜飽宜飢更有宜湯不宜散宜散不宜丸宜膏不宜圓其輕重大小上下表里治法各有當此皆一定之至理深思其義必其得於心也醫必備藥論古之醫者所用之藥皆自備之內經云司氣備物則無遺主矣當時韓康賣藥非賣藥也即治病也韓文公進學解云牛溲馬渤敗鼓之皮俱收並蓄特用無遺醫師之良也今北方人稱醫者為賣藥先生則醫者之自備藥可知自宋以後漸有寫方不備藥之醫其藥皆取之肆中今則舉世皆然夫賣藥者不知醫猶之可也乃行醫者竟不知藥則藥之是非真偽全然不同醫者與藥不相謀方即不誤而藥之誤多矣又古聖人之治病惟感冒之疾則以煎劑為主余者皆用丸散為多其丸散有非一時所能合者倘有急迫之疾必須丸散俟丸散合就而人已死矣又有一病只須一丸而愈合藥不可只合一丸若使病家為一人而合一料則一丸之外皆為無用惟醫家合之留待當用者用之不終棄也又有不常用不易得之藥儲之數年難遇一用藥肆之中因無人問則亦不備惟醫者自蓄之乃可待不時之需耳至於外科所用之煎方不過通散營衛耳若護心托毒全賴各種丸散之力其藥皆貴重難得及鍛鍊之物修合非一二日之功而所費又大亦不得為一人只合一二丸若外治之圍藥塗藥升藥降藥護肌腐肉止血行瘀定痛煞癢提膿呼毒生肉生皮續筋連骨又有薰蒸烙灸吊洗點溻等藥種種各異更復每症不同皆非一時所得備尤必須平時預合乃今之醫者既不知其方亦不講其法又資本以蓄藥料偶遇一大症內科則一煎方之外更無別方外科則膏藥之外更無餘藥即有之亦惟取極賤極易得之一二味以為應酬之具則安能使極危極險極奇極惡之症令起死回生乎故藥者醫家不可不全備者也乩方論世有書符請仙而求方者其所書之方固有極淺極陋極不典而不能治病且誤人者亦有極高極古極奇極穩以之治病而神效者其仙或託名呂純陽或託名張仲景其方亦宛然純陽仲景之遺法此其事甚奇然亦有理焉夫乩者機也人心之感召無所不通既慶心於求治則必又能治病之鬼神應之雖非真純陽仲景必先世之明於醫理不遇於時而死者其精靈一時不散遊行於天地之間因感而至以顯其能而其人病適當愈則獲遇之此亦有其理也其方未必盡效然皆必有意義反不若世之時醫用相反之藥以害人惟決死生之處不肯鑿鑿言之此則天機不輕泄之故也至於不通不典之方則秘持乩之術不工或病家之心不誠非真乩方也熱藥誤人最烈論凡藥之誤人雖不中病非與病相反者不能殺人即與病相反藥性平和者不能殺人與病相反性又不平和而用藥甚輕不能殺人性既相反藥劑又重其方中有幾味中病者或有幾味能解此藥性者亦不能殺人兼此數害或其人病甚輕或其人精力壯盛亦不能殺人蓋誤藥殺人如此之難也所以世之醫者大半皆誤亦不見其日殺數人也即使殺之乃輾轉因循以至於死死者不覺也其有幸而不死或漸自愈者反指所誤用之藥以為此方之功效又轉以之誤治他人矣所以終身誤人而不自知其咎也惟大熱大燥之藥則殺人為最烈蓋熱性之藥往往有毒又陽性急暴一入臟腑則血湧氣升若欺之陰氣本虛或當天時酷暑或其人傷暑傷熱一投熱劑兩火相爭目赤便閉舌燥齒乾口渴心煩肌裂神躁種種惡候一時俱發醫者及病傢俱不察或云更宜引火歸元或云此是陰症當加重其熱藥而佐以大補之品其人七竅皆血呼號宛轉狀如服毒而死病家全不以為咎醫者亦洋洋自得以為病勢當然總之愚人喜服補熱雖死不悔我目中所見不一垂涕泣而道之而醫者與病家無一能聽從者豈非所謂命哉夫大寒之藥亦能殺人其勢必緩猶為可救不若大熱之藥斷斷不可救也至於極輕淡之藥誤用亦能殺人此乃其人之本領甚薄或勢已危殆故小誤即能生變此又不可全歸咎於醫殺之了薄貼論今所用之膏藥古人謂之薄貼其用大端有二一以治表一以治里治表者如呼膿去腐止痛生肌並摭風護肉之類其膏宜輕薄而日換此理人所易知治里者或驅風寒或和氣血或消痰痞或壯筋骨其方甚多藥亦隨病加減其膏宜重厚而久貼此理人所難知何也蓋人之疾病由外以入內其流行於經絡臟腑者必服藥乃能驅之若其病既有定所在於皮膚筋骨之間可按而得者用膏貼之閉塞其氣使藥性從毛孔而入其腠理通經貫絡或提而出之或攻而散之較之服藥尤有力此至妙之法也故凡病之氣聚血結而有形者薄貼之法為良但制膏之法取藥必真心志必誠火候必至方能有效否則不能奏功至於敷熨吊溻種種雜法義亦相同在善醫者通變之而已貌似古方欺人論古聖人之立方不過四五味而目其審藥性至精至當其察病情至真至確方中所用之藥必准對其病而無毫髮之差無一味泛用之藥且能以一藥兼治數症故其藥味雖少而無症不該後世之人果能審其人之病與古方所治之病無少異則全用古方治之無不立效其如天下之風氣各殊人之氣稟各異則不得不依古人所制主病之方略為增減則藥味增矣又或病同而症甚雜未免欲兼顧則隨症增一二味而藥又增矣故後世之方藥味增多非其好為雜亂也乃學不如古人不能以一藥該數症故變簡而為繁耳此猶不失周詳之意且古方之設原有加減之法病症雜出亦有多品之劑藥味至十餘種自唐以後之方用藥漸多皆此義也乃近世之醫動云效法漢方藥止四五味其四五鼓掌之藥有用浮泛輕淡之品者雖不中病猶無大害若趨時之輩竟以人參附子乾薑蒼朮鹿茸熟地等峻補辛熱之品不論傷寒暑濕惟此數種輪流轉換以成一方種種與病相反每試必殺人毫不自悔既不辨病又不審藥性更不記方書以為此乃漢人之法嗚呼今之所學漢人之方何其害人如此之毒也其端起於近日之時醫好為高論以欺人又人情樂於溫補而富貴之家尤甚不如是則道不行所以人爭效尤以致貽害不息安有讀書考古深思體驗之君子出而挽回之亦世道生民之大幸也
